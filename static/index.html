<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEM Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
  --accent:#00d4ff; --accent2:#ff6b35; --text:#e2e8f0;
  --text-muted:#64748b; --text-dim:#94a3b8;
  --red:#ff4757; --green:#2ed573; --yellow:#ffd32a;
  --qld:#f39c12; --nsw:#3498db; --vic:#9b59b6; --sa:#e74c3c; --tas:#1abc9c;
  --font-mono:'Space Mono',monospace; --font-sans:'DM Sans',sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); min-height:100vh; overscroll-behavior:none; }

.header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,14,26,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.header-left { display:flex; align-items:center; gap:10px; }
.logo { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--accent); letter-spacing:0.1em; }
.pulse-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
.pulse-dot.loading { background:var(--yellow); }
.pulse-dot.error { background:var(--red); animation:none; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.last-updated { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
.refresh-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; }

.main { padding:12px 12px 80px; max-width:600px; margin:0 auto; }

.section-title {
  font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--text-muted); margin:20px 0 10px;
  display:flex; align-items:center; gap:8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.price-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.price-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:10px 6px; text-align:center; position:relative; overflow:hidden;
}
.price-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.price-card.qld::before{background:var(--qld)} .price-card.nsw::before{background:var(--nsw)}
.price-card.vic::before{background:var(--vic)} .price-card.sa::before{background:var(--sa)}
.price-card.tas::before{background:var(--tas)}
.price-card .region { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--text-muted); margin-bottom:4px; }
.price-card.qld .region{color:var(--qld)} .price-card.nsw .region{color:var(--nsw)}
.price-card.vic .region{color:var(--vic)} .price-card.sa  .region{color:var(--sa)}
.price-card.tas .region{color:var(--tas)}
.price-card .price { font-family:var(--font-mono); font-size:14px; font-weight:700; line-height:1; }
.price-card .price.negative{color:var(--green)} .price-card .price.low{color:var(--text)}
.price-card .price.medium{color:var(--yellow)} .price-card .price.high{color:var(--accent2)}
.price-card .price.vhigh{color:var(--red)}
.price-card .unit { font-family:var(--font-mono); font-size:8px; color:var(--text-muted); margin-top:2px; }

.demand-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.demand-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 6px; text-align:center; }
.demand-card .region { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--text-muted); margin-bottom:4px; }
.demand-card .value { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--accent); }
.demand-card .unit { font-family:var(--font-mono); font-size:8px; color:var(--text-muted); margin-top:2px; }

.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
.chart-card .chart-title { font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:12px; }
.chart-container { position:relative; height:180px; }

.ic-list { display:flex; flex-direction:column; gap:8px; }
.ic-row { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
.ic-name { font-family:var(--font-mono); font-size:11px; color:var(--text-dim); min-width:120px; }
.ic-bar-wrap { flex:1; height:6px; background:var(--surface2); border-radius:3px; margin:0 12px; position:relative; }
.ic-bar { position:absolute; top:0; height:100%; border-radius:3px; }
.ic-bar.positive{background:var(--accent);left:50%} .ic-bar.negative{background:var(--accent2);right:50%}
.ic-midpoint { position:absolute; top:-3px; left:50%; width:2px; height:12px; background:var(--border); transform:translateX(-50%); }
.ic-value { font-family:var(--font-mono); font-size:12px; font-weight:700; min-width:65px; text-align:right; }
.ic-value.positive{color:var(--accent)} .ic-value.negative{color:var(--accent2)}

.state-msg { text-align:center; padding:40px 20px; color:var(--text-muted); font-family:var(--font-mono); font-size:13px; }
.state-msg .icon { font-size:36px; margin-bottom:12px; }

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(10,14,26,0.96); backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex; justify-content:space-around;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom)); z-index:100;
}
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:4px 10px; color:var(--text-muted); }
.nav-btn.active { color:var(--accent); }
.nav-btn .icon { font-size:18px; }
.nav-btn .label { font-size:10px; font-family:var(--font-mono); }

.table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
table { width:100%; border-collapse:collapse; font-family:var(--font-mono); font-size:11px; }
th { text-align:left; padding:6px 10px; color:var(--text-muted); font-weight:700; letter-spacing:0.08em; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:8px 10px; border-bottom:1px solid rgba(30,45,69,0.5); white-space:nowrap; }
tr:last-child td { border-bottom:none; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">⚡ NEM</div>
    <div class="pulse-dot loading" id="statusDot"></div>
  </div>
  <div class="last-updated" id="lastUpdated">Loading…</div>
  <button class="refresh-btn" onclick="fetchData()">↻</button>
</header>

<main class="main" id="mainContent">
  <div class="state-msg"><div class="icon">⚡</div><div>Fetching NEM data…</div></div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPanel('prices')" id="nav-prices">
    <span class="icon">💲</span><span class="label">Prices</span>
  </button>
  <button class="nav-btn" onclick="showPanel('generation')" id="nav-generation">
    <span class="icon">⚡</span><span class="label">Gen</span>
  </button>
  <button class="nav-btn" onclick="showPanel('demand')" id="nav-demand">
    <span class="icon">📊</span><span class="label">Demand</span>
  </button>
  <button class="nav-btn" onclick="showPanel('interconnectors')" id="nav-interconnectors">
    <span class="icon">🔗</span><span class="label">Links</span>
  </button>
  <button class="nav-btn" onclick="showPanel('origin')" id="nav-origin">
    <span class="icon">🟠</span><span class="label">Origin</span>
  </button>
</nav>

<script>
const REGIONS = ['QLD1','NSW1','VIC1','SA1','TAS1'];
const REGION_SHORT = {QLD1:'QLD',NSW1:'NSW',VIC1:'VIC',SA1:'SA',TAS1:'TAS'};
const REGION_CLASS = {QLD1:'qld',NSW1:'nsw',VIC1:'vic',SA1:'sa',TAS1:'tas'};
const REGION_COLORS = {QLD1:'#f39c12',NSW1:'#3498db',VIC1:'#9b59b6',SA1:'#e74c3c',TAS1:'#1abc9c'};
const FUEL_ICONS = {"Black Coal":"⬛","Brown Coal":"🟫","Gas":"🔥","Hydro":"💧","Wind":"🌀","Solar":"☀️","Battery":"🔋","Liquid":"🛢️","Other":"⚙️"};

let currentPanel = 'prices';
let currentGenRegion = 'NSW1';
let charts = {};
let latestData = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

function priceClass(v) {
  if (v < 0) return 'negative';
  if (v < 100) return 'low';
  if (v < 300) return 'medium';
  if (v < 1000) return 'high';
  return 'vhigh';
}
function fmt(n, d=0) {
  if (n === undefined || n === null) return '—';
  return Number(n).toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtPrice(n) {
  if (n === undefined || n === null) return '—';
  const v = Number(n);
  return (v < 0 ? '-$' : '$') + Math.abs(v).toFixed(2);
}
function fmtTime(iso) {
  try {
    return new Date(iso).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',timeZone:'Australia/Sydney'}) + ' AEST';
  } catch { return ''; }
}
function nowAEST() {
  return new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Australia/Sydney'});
}
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

const CHART_DEFAULTS = {
  responsive:true, maintainAspectRatio:false,
  interaction:{mode:'index',intersect:false},
  plugins:{
    legend:{display:false},
    tooltip:{
      backgroundColor:'#111827', borderColor:'#1e2d45', borderWidth:1,
      titleColor:'#94a3b8', bodyColor:'#e2e8f0',
      titleFont:{family:'Space Mono',size:10}, bodyFont:{family:'Space Mono',size:11}
    }
  },
  scales:{
    x:{ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxTicksLimit:8,maxRotation:0},grid:{color:'#1e2d4544'}},
    y:{ticks:{color:'#94a3b8',font:{family:'Space Mono',size:10}},grid:{color:'#1e2d45'}}
  }
};

function nowLinePlugin(nowIndex) {
  return {
    id:'nowLine',
    afterDraw(chart) {
      if (nowIndex < 0) return;
      const {ctx:c,chartArea,scales} = chart;
      const x = scales.x.getPixelForValue(nowIndex);
      c.save();
      c.beginPath(); c.moveTo(x,chartArea.top); c.lineTo(x,chartArea.bottom);
      c.strokeStyle='rgba(255,255,255,0.25)'; c.lineWidth=1; c.setLineDash([3,3]); c.stroke();
      c.fillStyle='rgba(255,255,255,0.5)'; c.font='9px Space Mono';
      c.fillText('NOW',x+3,chartArea.top+12); c.restore();
    }
  };
}

// ── Navigation ────────────────────────────────────────────────────────────────

function showPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + name);
  if (btn) btn.classList.add('active');
  if (latestData) renderPanel(name, latestData);
}

// ── Prices ────────────────────────────────────────────────────────────────────

function renderPrices(data) {
  const prices = data.prices || {};
  const demand = data.demand || {};
  let html = '<div class="section-title">Latest Spot Prices ($/MWh)</div><div class="price-grid">';
  for (const r of REGIONS) {
    const p = prices[r];
    const cls = p !== undefined ? priceClass(p) : 'low';
    html += `<div class="price-card ${REGION_CLASS[r]}">
      <div class="region">${REGION_SHORT[r]}</div>
      <div class="price ${cls}">${p !== undefined ? fmtPrice(p) : '—'}</div>
      <div class="unit">$/MWh</div></div>`;
  }
  html += '</div>';
  html += '<div class="section-title">Price History + Predispatch</div>';
  html += '<div class="chart-card"><div class="chart-title">30-min Trading — Actual (solid) · Predispatch (dashed)</div>';
  html += '<div class="chart-container" style="height:250px"><canvas id="priceHistChart"></canvas></div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">';
  for (const r of REGIONS) {
    html += `<button onclick="togglePriceRegion('${r}')" id="pr-${r}" data-on="1"
      style="font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:20px;
      border:1px solid ${REGION_COLORS[r]};background:${REGION_COLORS[r]}33;color:${REGION_COLORS[r]};cursor:pointer"
      >${REGION_SHORT[r]}</button>`;
  }
  html += '</div></div>';
  html += '<div class="section-title">Total Demand (MW)</div><div class="demand-grid">';
  for (const r of REGIONS) {
    const d = demand[r];
    html += `<div class="demand-card">
      <div class="region" style="color:${REGION_COLORS[r]}">${REGION_SHORT[r]}</div>
      <div class="value">${d !== undefined ? fmt(d) : '—'}</div>
      <div class="unit">MW</div></div>`;
  }
  html += '</div>';
  return html;
}

function togglePriceRegion(r) {
  if (!charts.priceHist) return;
  const btn = document.getElementById('pr-' + r);
  const on = btn.dataset.on === '1';
  btn.dataset.on = on ? '0' : '1';
  btn.style.opacity = on ? '0.35' : '1';
  charts.priceHist.data.datasets.forEach((ds, i) => {
    if (ds.regionId === r) charts.priceHist.getDatasetMeta(i).hidden = on;
  });
  charts.priceHist.update();
}

function drawPriceChart(data) {
  destroyChart('priceHist');
  const ctx = document.getElementById('priceHistChart');
  if (!ctx) return;
  const hist = data.historical_prices || {};
  const pd   = data.predispatch_prices || {};
  const labelSet = new Set();
  for (const r of REGIONS) {
    (hist[r] || []).forEach(p => labelSet.add(p.interval));
    (pd[r]   || []).forEach(p => labelSet.add(p.interval));
  }
  const labels = Array.from(labelSet).sort();
  if (labels.length === 0) {
    ctx.closest('.chart-card').querySelector('.chart-title').textContent = 'Price history — data loading on next refresh';
    ctx.style.display = 'none';
    return;
  }
  const now = nowAEST();
  const nowIdx = labels.findIndex(l => l >= now);
  const datasets = [];
  for (const r of REGIONS) {
    const color = REGION_COLORS[r];
    const hm = {}; (hist[r] || []).forEach(p => hm[p.interval] = p.rrp);
    const pm = {}; (pd[r]   || []).forEach(p => pm[p.interval] = p.rrp);
    datasets.push({
      label: REGION_SHORT[r], regionId: r,
      data: labels.map(l => hm[l] !== undefined ? hm[l] : null),
      borderColor: color, backgroundColor:'transparent',
      borderWidth:2, pointRadius:0, tension:0.3, spanGaps:false,
      borderDash:[], segment:{borderDash:()=>[]}
    });
    datasets.push({
      label: REGION_SHORT[r]+' PD', regionId: r,
      data: labels.map(l => pm[l] !== undefined ? pm[l] : null),
      borderColor: color+'88', backgroundColor:'transparent',
      borderWidth:2, pointRadius:0, tension:0.3, spanGaps:false,
      borderDash:[5,4], segment:{borderDash:()=>[5,4]}
    });
  }
  charts.priceHist = new Chart(ctx, {
    type:'line', data:{labels,datasets},
    options:{...CHART_DEFAULTS,
      plugins:{...CHART_DEFAULTS.plugins,
        tooltip:{...CHART_DEFAULTS.plugins.tooltip,
          filter:i=>i.raw!==null,
          callbacks:{label:c=>c.raw===null?null:` ${c.dataset.label}: $${c.raw.toFixed(2)}/MWh`}
        }
      },
      scales:{...CHART_DEFAULTS.scales,
        y:{...CHART_DEFAULTS.scales.y, ticks:{...CHART_DEFAULTS.scales.y.ticks, callback:v=>'$'+v.toFixed(0)}}
      }
    },
    plugins:[nowLinePlugin(nowIdx)]
  });
}

// ── Generation ────────────────────────────────────────────────────────────────

function renderGeneration(data) {
  const fc = data.fuel_colors || {};
  let html = '<div class="section-title">Generation Fuel Mix</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  for (const r of REGIONS) {
    html += `<button onclick="selectGenRegion('${r}')" id="gr-${r}"
      style="font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:20px;
      border:1px solid ${REGION_COLORS[r]};background:${REGION_COLORS[r]}33;color:${REGION_COLORS[r]};cursor:pointer"
      >${REGION_SHORT[r]}</button>`;
  }
  html += '</div>';
  html += '<div class="chart-card"><div class="chart-title">Fuel Mix — Actual (filled) · Predispatch (dashed)</div>';
  html += '<div class="chart-container" style="height:280px"><canvas id="fuelChart"></canvas></div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">';
  for (const [fuel, color] of Object.entries(fc)) {
    html += `<div style="display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10px;color:#94a3b8">
      <div style="width:10px;height:10px;border-radius:2px;background:${color}"></div>${fuel}</div>`;
  }
  html += '</div></div>';
  const gen = data.generation || {};
  const raw = data.raw_summary || {};
  html += '<div class="chart-card"><div class="chart-title">Current Generation</div>';
  html += '<div class="table-wrap"><table><tr><th>Region</th><th>Scheduled</th><th>Semi-Sched</th><th>Net Int.</th></tr>';
  for (const r of REGIONS) {
    const g = gen[r] || {}, rw = raw[r] || {};
    const ni = g['Net Interchange'] ?? rw.NETINTERCHANGE ?? 0;
    html += `<tr>
      <td style="color:${REGION_COLORS[r]};font-weight:700">${REGION_SHORT[r]}</td>
      <td>${fmt(g.Scheduled ?? rw.DISPATCHABLEGENERATION)} MW</td>
      <td>${fmt(g['Semi-Scheduled'] ?? rw.SEMISCHEDULEDGENERATION)} MW</td>
      <td style="color:${ni>=0?'#00d4ff':'#ff6b35'}">${fmt(ni)} MW</td></tr>`;
  }
  html += '</table></div></div>';
  return html;
}

function selectGenRegion(region) {
  currentGenRegion = region;
  for (const r of REGIONS) {
    const btn = document.getElementById('gr-' + r);
    if (!btn) continue;
    const active = r === region;
    btn.style.background = active ? REGION_COLORS[r] + '88' : REGION_COLORS[r] + '33';
    btn.style.fontWeight = active ? '700' : '400';
  }
  if (latestData) drawGenChart(latestData);
}

function drawGenChart(data) {
  destroyChart('gen');
  const ctx = document.getElementById('fuelChart');
  if (!ctx) return;
  const r = currentGenRegion;
  const fc = data.fuel_colors || {};
  const fuels = data.all_fuels || Object.keys(fc);
  const histArr = (data.fuel_mix_history || {})[r] || [];
  const pdArr   = (data.predispatch_gen  || {})[r] || [];
  const labelSet = new Set();
  histArr.forEach(p => labelSet.add(p.interval));
  pdArr.forEach(p => labelSet.add(p.interval));
  const labels = Array.from(labelSet).sort();
  if (labels.length === 0) {
    ctx.closest('.chart-card').querySelector('.chart-title').textContent = 'Fuel mix — data loading on next refresh';
    ctx.style.display = 'none';
    return;
  }
  const now = nowAEST();
  const nowIdx = labels.findIndex(l => l >= now);
  const hm = {}; histArr.forEach(p => hm[p.interval] = p);
  const pm = {}; pdArr.forEach(p => pm[p.interval] = p);
  const activeFuels = fuels.filter(f => histArr.some(p => p[f] > 0));
  const datasets = [];
  for (const fuel of activeFuels) {
    const color = fc[fuel] || '#95a5a6';
    datasets.push({
      label: fuel,
      data: labels.map(l => hm[l] ? Math.max(0, hm[l][fuel] || 0) : null),
      backgroundColor: color + 'cc', borderColor: color, borderWidth:1,
      fill:true, pointRadius:0, tension:0.2, spanGaps:false, stack:'actual',
      segment:{borderDash:()=>[]}
    });
  }
  if (pdArr.length > 0) {
    datasets.push({
      label:'Sched (PD)',
      data: labels.map(l => pm[l] ? Math.max(0, pm[l].Scheduled || 0) : null),
      backgroundColor:'rgba(100,116,139,0.3)', borderColor:'#64748b', borderWidth:1,
      borderDash:[4,3], fill:true, pointRadius:0, tension:0.2, spanGaps:false, stack:'pd'
    });
    datasets.push({
      label:'Semi (PD)',
      data: labels.map(l => pm[l] ? Math.max(0, pm[l].SemiScheduled || 0) : null),
      backgroundColor:'rgba(75,192,192,0.25)', borderColor:'#4bc0c0', borderWidth:1,
      borderDash:[4,3], fill:true, pointRadius:0, tension:0.2, spanGaps:false, stack:'pd'
    });
  }
  charts.gen = new Chart(ctx, {
    type:'line', data:{labels,datasets},
    options:{...CHART_DEFAULTS,
      plugins:{...CHART_DEFAULTS.plugins,
        legend:{display:false},
        tooltip:{...CHART_DEFAULTS.plugins.tooltip,
          filter:i=>i.raw!==null&&i.raw>0,
          callbacks:{label:c=>c.raw>0?` ${c.dataset.label}: ${fmt(c.raw)} MW`:null}
        }
      },
      scales:{
        x:{stacked:true, ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxTicksLimit:8,maxRotation:0}, grid:{color:'#1e2d4544'}},
        y:{stacked:true, ticks:{color:'#94a3b8',font:{family:'Space Mono',size:10},callback:v=>v.toLocaleString()+' MW'}, grid:{color:'#1e2d45'}}
      }
    },
    plugins:[nowLinePlugin(nowIdx)]
  });
}

// ── Demand ────────────────────────────────────────────────────────────────────

function renderDemand(data) {
  const demand = data.demand || {}, raw = data.raw_summary || {};
  let html = '<div class="section-title">Latest Demand (MW)</div><div class="demand-grid">';
  for (const r of REGIONS) {
    const d = demand[r];
    html += `<div class="demand-card">
      <div class="region" style="color:${REGION_COLORS[r]}">${REGION_SHORT[r]}</div>
      <div class="value">${d !== undefined ? fmt(d) : '—'}</div>
      <div class="unit">MW</div></div>`;
  }
  html += '</div>';
  html += '<div class="section-title">Demand History + Predispatch</div>';
  html += '<div class="chart-card"><div class="chart-title">Total Demand — Actual (solid) · Predispatch (dashed)</div>';
  html += '<div class="chart-container" style="height:250px"><canvas id="demandHistChart"></canvas></div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">';
  for (const r of REGIONS) {
    html += `<button onclick="toggleDemandRegion('${r}')" id="dr-${r}" data-on="1"
      style="font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:20px;
      border:1px solid ${REGION_COLORS[r]};background:${REGION_COLORS[r]}33;color:${REGION_COLORS[r]};cursor:pointer"
      >${REGION_SHORT[r]}</button>`;
  }
  html += '</div></div>';
  html += '<div class="chart-card"><div class="chart-title">Demand Details</div>';
  html += '<div class="table-wrap"><table><tr><th>Region</th><th>Demand</th><th>Forecast</th><th>Initial Supply</th></tr>';
  for (const r of REGIONS) {
    const rw = raw[r] || {}, d = demand[r] ?? rw.TOTALDEMAND;
    html += `<tr>
      <td style="color:${REGION_COLORS[r]};font-weight:700">${REGION_SHORT[r]}</td>
      <td>${fmt(d)} MW</td><td>${fmt(rw.DEMANDFORECAST)} MW</td><td>${fmt(rw.INITIALSUPPLY)} MW</td></tr>`;
  }
  html += '</table></div></div>';
  return html;
}

function toggleDemandRegion(r) {
  if (!charts.demandHist) return;
  const btn = document.getElementById('dr-' + r);
  const on = btn.dataset.on === '1';
  btn.dataset.on = on ? '0' : '1';
  btn.style.opacity = on ? '0.35' : '1';
  charts.demandHist.data.datasets.forEach((ds, i) => {
    if (ds.regionId === r) charts.demandHist.getDatasetMeta(i).hidden = on;
  });
  charts.demandHist.update();
}

function drawDemandChart(data) {
  destroyChart('demandHist');
  const ctx = document.getElementById('demandHistChart');
  if (!ctx) return;
  const hist = data.demand_history || {}, pd = data.predispatch_demand || {};
  const labelSet = new Set();
  for (const r of REGIONS) {
    (hist[r] || []).forEach(p => labelSet.add(p.interval));
    (pd[r]   || []).forEach(p => labelSet.add(p.interval));
  }
  const labels = Array.from(labelSet).sort();
  if (labels.length === 0) {
    ctx.closest('.chart-card').querySelector('.chart-title').textContent = 'Demand history — data loading on next refresh';
    ctx.style.display = 'none';
    return;
  }
  const now = nowAEST();
  const nowIdx = labels.findIndex(l => l >= now);
  const datasets = [];
  for (const r of REGIONS) {
    const color = REGION_COLORS[r];
    const hm = {}; (hist[r] || []).forEach(p => hm[p.interval] = p.demand);
    const pm = {}; (pd[r]   || []).forEach(p => pm[p.interval] = p.demand);
    datasets.push({
      label: REGION_SHORT[r], regionId: r,
      data: labels.map(l => hm[l] !== undefined ? hm[l] : null),
      borderColor:color, backgroundColor:'transparent',
      borderWidth:2, pointRadius:0, tension:0.3, spanGaps:false,
      borderDash:[], segment:{borderDash:()=>[]}
    });
    datasets.push({
      label: REGION_SHORT[r]+' PD', regionId: r,
      data: labels.map(l => pm[l] !== undefined ? pm[l] : null),
      borderColor:color+'88', backgroundColor:'transparent',
      borderWidth:2, pointRadius:0, tension:0.3, spanGaps:false,
      borderDash:[5,4], segment:{borderDash:()=>[5,4]}
    });
  }
  charts.demandHist = new Chart(ctx, {
    type:'line', data:{labels,datasets},
    options:{...CHART_DEFAULTS,
      plugins:{...CHART_DEFAULTS.plugins,
        tooltip:{...CHART_DEFAULTS.plugins.tooltip,
          filter:i=>i.raw!==null,
          callbacks:{label:c=>c.raw===null?null:` ${c.dataset.label}: ${fmt(c.raw)} MW`}
        }
      },
      scales:{...CHART_DEFAULTS.scales,
        y:{...CHART_DEFAULTS.scales.y, ticks:{...CHART_DEFAULTS.scales.y.ticks, callback:v=>v.toLocaleString()+' MW'}}
      }
    },
    plugins:[nowLinePlugin(nowIdx)]
  });
}

// ── Interconnectors ───────────────────────────────────────────────────────────

function renderInterconnectors(data) {
  const ics = data.interconnectors || {};
  let html = '<div class="section-title">Interconnector Flows</div>';
  if (Object.keys(ics).length === 0) {
    return html + '<div class="state-msg"><div class="icon">🔗</div><div>No data</div></div>';
  }
  html += '<div class="chart-card"><div class="chart-title">MW Flow (positive = export)</div>';
  html += '<div class="chart-container" style="height:220px"><canvas id="icChart"></canvas></div></div>';
  const sorted = Object.entries(ics).sort((a,b) => Math.abs(b[1].flow)-Math.abs(a[1].flow));
  const maxFlow = Math.max(...sorted.map(([,v]) => Math.abs(v.flow)), 1);
  html += '<div class="ic-list">';
  for (const [id, val] of sorted) {
    const flow = val.flow || 0;
    const pct = Math.min(Math.abs(flow)/maxFlow*50, 50);
    const pos = flow >= 0;
    html += `<div class="ic-row">
      <div class="ic-name">${id}</div>
      <div class="ic-bar-wrap">
        <div class="ic-midpoint"></div>
        <div class="ic-bar ${pos?'positive':'negative'}" style="width:${pct}%"></div>
      </div>
      <div class="ic-value ${pos?'positive':'negative'}">${flow>0?'+':''}${fmt(flow)} <span style="font-size:9px;opacity:0.6">MW</span></div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function drawIcChart(data) {
  destroyChart('ic');
  const ctx = document.getElementById('icChart');
  if (!ctx) return;
  const ics = data.interconnectors || {};
  const entries = Object.entries(ics).sort((a,b) => Math.abs(b[1].flow)-Math.abs(a[1].flow));
  charts.ic = new Chart(ctx, {
    type:'bar', data:{
      labels: entries.map(([k]) => k),
      datasets:[{
        data: entries.map(([,v]) => v.flow||0),
        backgroundColor: entries.map(([,v]) => (v.flow||0)>=0?'#00d4ff88':'#ff6b3588'),
        borderColor: entries.map(([,v]) => (v.flow||0)>=0?'#00d4ff':'#ff6b35'),
        borderWidth:1, borderRadius:4
      }]
    },
    options:{...CHART_DEFAULTS, indexAxis:'y',
      plugins:{...CHART_DEFAULTS.plugins,
        tooltip:{...CHART_DEFAULTS.plugins.tooltip,
          callbacks:{label:c=>` ${c.raw>0?'+':''}${c.raw.toFixed(0)} MW`}
        }
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{family:'Space Mono',size:10},callback:v=>v.toLocaleString()+' MW'},grid:{color:'#1e2d45'}},
        y:{ticks:{color:'#94a3b8',font:{family:'Space Mono',size:10}},grid:{color:'#1e2d45'}}
      }
    }
  });
}

// ── Origin ────────────────────────────────────────────────────────────────────

function renderOrigin(data) {
  const assets = data.origin_assets || {};
  const prices = data.prices || {};
  const fc = data.fuel_colors || {};

  // Group by station
  const stations = {};
  for (const [duid, a] of Object.entries(assets)) {
    if (!stations[a.station]) stations[a.station] = {fuel:a.fuel, region:a.region, units:[], totalMw:0, totalCap:0};
    stations[a.station].units.push({duid, ...a});
    if (a.mw !== null && a.mw !== undefined) stations[a.station].totalMw += a.mw;
    stations[a.station].totalCap += a.capacity || 0;
  }

  // Fuel totals
  const fuelTotals = {};
  for (const a of Object.values(assets)) {
    if (a.mw !== null && a.mw !== undefined) fuelTotals[a.fuel] = (fuelTotals[a.fuel]||0) + a.mw;
  }
  const totalMw = Object.values(fuelTotals).reduce((s,v)=>s+v,0);
  const totalCap = Object.values(assets).reduce((s,a)=>s+(a.capacity||0),0);

  let html = '<div class="section-title">Origin Portfolio</div>';

  // Fuel summary
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
  for (const [fuel, mw] of Object.entries(fuelTotals).sort((a,b)=>b[1]-a[1])) {
    const color = fc[fuel] || '#95a5a6';
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:10px 8px;text-align:center;border-top:3px solid ${color}">
      <div style="font-size:16px;margin-bottom:2px">${FUEL_ICONS[fuel]||'⚡'}</div>
      <div style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:${color}">${fmt(mw)} <span style="font-size:9px;color:var(--text-muted)">MW</span></div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-top:2px">${fuel}</div>
    </div>`;
  }
  html += '</div>';

  // Total bar
  const pct = totalCap > 0 ? Math.min(totalMw/totalCap*100, 100) : 0;
  html += `<div class="chart-card" style="margin:10px 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Total Output</div>
      <div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:#ff6b35">${fmt(totalMw)} <span style="font-size:10px;color:var(--text-muted)">/ ${fmt(totalCap)} MW</span></div>
    </div>
    <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${pct.toFixed(1)}%;background:linear-gradient(90deg,#ff6b35,#ffd32a);border-radius:4px"></div>
    </div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:4px;text-align:right">${pct.toFixed(1)}% capacity</div>
  </div>`;

  // Stations
  html += '<div class="section-title">Stations</div>';
  for (const [name, st] of Object.entries(stations).sort((a,b)=>b[1].totalMw-a[1].totalMw)) {
    const color = fc[st.fuel] || '#95a5a6';
    const icon = FUEL_ICONS[st.fuel] || '⚡';
    const sPct = st.totalCap > 0 ? Math.min(st.totalMw/st.totalCap*100,100) : 0;
    const rrp = prices[st.region];
    const rc = REGION_COLORS[st.region] || '#64748b';
    html += `<div class="chart-card" style="margin-bottom:8px;border-left:3px solid ${color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-family:var(--font-mono);font-size:12px;font-weight:700">${icon} ${name}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:${color};margin-top:2px">
            ${st.fuel} · <span style="color:${rc}">${REGION_SHORT[st.region]||st.region}</span>${rrp!==undefined?' · $'+rrp.toFixed(2)+'/MWh':''}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:16px;font-weight:700;color:${st.totalMw>0?'#2ed573':'#64748b'}">${fmt(st.totalMw)}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">/ ${fmt(st.totalCap)} MW</div>
        </div>
      </div>
      <div style="height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${sPct.toFixed(1)}%;background:${color};opacity:0.8;border-radius:3px"></div>
      </div>`;
    if (st.units.length > 1) {
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px">';
      for (const u of st.units.sort((a,b)=>a.duid.localeCompare(b.duid))) {
        const on = u.mw !== null && u.mw > 5;
        const uPct = (u.mw !== null && u.capacity) ? Math.min(u.mw/u.capacity*100,100).toFixed(0) : 0;
        html += `<div style="background:var(--surface2);border-radius:6px;padding:5px 7px;border:1px solid ${on?color+'55':'var(--border)'}">
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">${u.duid}</div>
          <div style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:${on?color:'#475569'};margin-top:2px">${u.mw!==null?fmt(u.mw)+' MW':'—'}</div>
          <div style="height:3px;background:var(--surface);border-radius:2px;margin-top:3px;overflow:hidden">
            <div style="height:100%;width:${uPct}%;background:${color};opacity:0.7"></div>
          </div>
        </div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

// ── Panel router ──────────────────────────────────────────────────────────────

function renderPanel(panel, data) {
  const main = document.getElementById('mainContent');
  let html = '';
  try {
    if (panel === 'prices')        html = renderPrices(data);
    else if (panel === 'generation') html = renderGeneration(data);
    else if (panel === 'demand')   html = renderDemand(data);
    else if (panel === 'interconnectors') html = renderInterconnectors(data);
    else if (panel === 'origin')   html = renderOrigin(data);
  } catch(e) {
    console.error('Render error:', e);
    html = `<div class="state-msg"><div class="icon">⚠️</div><div style="font-size:11px">${e.message}</div></div>`;
  }
  main.innerHTML = html;
  requestAnimationFrame(() => {
    try {
      if (panel === 'prices')        drawPriceChart(data);
      else if (panel === 'generation') selectGenRegion(currentGenRegion);
      else if (panel === 'demand')   drawDemandChart(data);
      else if (panel === 'interconnectors') drawIcChart(data);
    } catch(e) {
      console.error('Chart error:', e);
    }
  });
}

// ── Data fetching ─────────────────────────────────────────────────────────────

async function fetchData() {
  const dot = document.getElementById('statusDot');
  const upd = document.getElementById('lastUpdated');
  dot.className = 'pulse-dot loading';
  try {
    const resp = await fetch('/api/data');
    if (resp.status === 503 || resp.status === 202) {
      upd.textContent = 'Waiting for data…';
      setTimeout(fetchData, 5000);
      return;
    }
    const data = await resp.json();
    latestData = data;
    dot.className = 'pulse-dot';
    upd.textContent = data.last_updated ? fmtTime(data.last_updated) : 'Just now';
    renderPanel(currentPanel, data);
  } catch(err) {
    console.error(err);
    dot.className = 'pulse-dot error';
    upd.textContent = 'Error';
    document.getElementById('mainContent').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><div>Could not load data</div><div style="margin-top:8px;font-size:11px;color:#475569">${err.message}</div></div>`;
  }
}

fetchData();
setInterval(fetchData, 300000);
</script>
