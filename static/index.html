function renderWeatherTable(weather) {
  const regions = ['QLD1','NSW1','VIC1','SA1'];
  const REGION_LABEL = {QLD1:'QLD',NSW1:'NSW',VIC1:'VIC',SA1:'SA',TAS1:'TAS'};

  let days = [];
  for (const r of regions) {
    if (weather[r] && weather[r].days && weather[r].days.length) {
      days = weather[r].days;
      break;
    }
  }

  if (!days.length) {
    return '<div style="font-family:var(--font-mono);font-size:10px;color:#475569;padding:8px 0 4px">Weather loading… (refreshes every 30 min)</div>';
  }

  const cellStyle = 'padding:2px 4px;text-align:center;font-size:10px;font-family:var(--font-mono);min-width:30px;';
  const headerCellStyle = 'padding:2px 4px;text-align:center;font-size:8px;font-family:var(--font-mono);color:#64748b;white-space:nowrap;';
  const labelCellStyle = 'padding:2px 6px;text-align:left;font-size:9px;font-family:var(--font-mono);color:#94a3b8;white-space:nowrap;';
  const regionCellStyle = 'padding:2px 6px;text-align:left;font-size:9px;font-family:var(--font-mono);font-weight:700;color:#94a3b8;';
  const tableStyle = 'width:100%;border-collapse:collapse;margin-bottom:4px;';

  const buildTable = (type) => {
    const label = type === 'max' ? 'Maximum Temperatures' : 'Minimum Temperatures';
    let t = `<div style="font-family:var(--font-mono);font-size:9px;font-weight:700;color:#94a3b8;
      letter-spacing:0.05em;padding:4px 0 2px;text-transform:uppercase">${label}</div>`;
    t += `<table style="${tableStyle}">`;
    t += '<tr>';
    t += `<td style="${regionCellStyle}"></td>`;
    t += `<td style="${labelCellStyle}"></td>`;
    for (const d of days) {
      t += `<td style="${headerCellStyle}">${d.day_of_week}<br><span style="color:#475569">${d.date_label}</span></td>`;
    }
    t += '</tr>';
    for (const r of regions) {
      const rData = weather[r];
      if (!rData) continue;
      t += '<tr>';
      t += `<td style="${regionCellStyle}">${REGION_LABEL[r]}</td>`;
      t += `<td style="${labelCellStyle}">${rData.name}</td>`;
      for (const d of (rData.days || [])) {
        const val = type === 'max' ? d.temp_max : d.temp_min;
        const [bg, textCol] = tempColour(val, type);
        const hasBg = bg !== 'transparent';
        t += `<td style="${cellStyle}background:${bg};color:${textCol};border-radius:${hasBg?'3px':'0'};font-weight:${hasBg?'700':'400'}">
          ${val !== null && val !== undefined ? val + '°' : '—'}
        </td>`;
      }
      t += '</tr>';
    }
    t += '</table>';
    return t;
  };

  let out = '<div class="chart-card" style="margin-bottom:12px;padding:12px 14px;overflow-x:auto">';
  out += buildTable('max');
  out += buildTable('min');
  out += '<div style="font-size:9px;color:#475569;font-family:var(--font-mono);margin-top:4px">Source: Bureau of Meteorology · refreshes every 30 min</div>';
  out += '</div>';
  return out;
}

function tempColour(t, type) {
  if (t === null || t === undefined) return ['transparent', '#94a3b8'];
  if (type === 'max') {
    if (t >= 35) return ['#dc2626', '#fecaca'];
    if (t >= 30) return ['#f97316', '#1e293b'];
    if (t < 15)  return ['#3b82f6', '#bfdbfe'];
    return ['transparent', '#94a3b8'];
  } else {
    if (t >= 23) return ['#dc2626', '#fecaca'];
    if (t >= 20) return ['#f97316', '#1e293b'];
    if (t < 10)  return ['#3b82f6', '#bfdbfe'];
    return ['transparent', '#94a3b8'];
  }
}

function renderDayAhead(data) {
  const tomorrowDate = new Date();
  tomorrowDate.setDate(tomorrowDate.getDate() + 1);
  const dayStr = tomorrowDate.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'short' });

  let html = '';

  // ── Weather forecast (above heading) ─────────────────────────────────────────
  try {
    const weather = (slowData && slowData.weather) || {};
    html += `<div id="weather-table-container">${renderWeatherTable(weather)}</div>`;
  } catch(e) { console.warn('Weather render error:', e); }

  html += `<div class="section-title" style="margin-top:8px">${dayStr}</div>`;

  // Helper: render per-chart region pills (TAS off by default)
  const chartPills = (chartId, filterVar) => {
    const allOn = REGIONS.every(r => filterVar.has(r));
    let p = `<div class="region-pills" style="margin-top:6px;margin-bottom:2px">`;
    p += `<button class="region-pill ${allOn?'active':''}" style="color:#94a3b8;border-color:#94a3b8" onclick="toggleDAPills('${chartId}','NEM')" id="dap-${chartId}-NEM">NEM</button>`;
    for (const r of REGIONS) {
      const on = filterVar.has(r);
      const color = REGION_COLORS[r];
      p += `<button class="region-pill ${on?'active':''}" style="color:${color};border-color:${color}" onclick="toggleDAPills('${chartId}','${r}')" id="dap-${chartId}-${r}">${REGION_SHORT[r]}</button>`;
    }
    p += '</div>';
    return p;
  };

  // Price chart
  html += '<div class="chart-card">';
  html += '<div class="chart-title">Price Forecast ($/MWh) — Predispatch</div>';
  html += '<div class="chart-container" style="height:220px"><canvas id="dayAheadPriceChart"></canvas></div>';
  html += chartPills('price', daPriceFilter);
  html += '</div>';

  // Demand chart
  html += '<div class="chart-card" style="margin-top:12px">';
  html += '<div class="chart-title">Demand Forecast (MW) — Predispatch</div>';
  html += '<div class="chart-container" style="height:200px"><canvas id="dayAheadDemandChart"></canvas></div>';
  html += chartPills('demand', daDemandFilter);
  html += '</div>';

  // D+1 Wind + Solar chart
  html += '<div class="chart-card" style="margin-top:12px">';
  html += '<div class="chart-title">Wind + Solar Forecast — Predispatch</div>';
  html += '<div style="position:relative;height:220px"><canvas id="da1RenewChart"></canvas></div>';
  html += chartPills('da1renew', da1RenewFilter);
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">';
  html += `<button onclick="toggleDa1RenewFuel('solar')" id="da1-solar" data-on="${_da1Solar?'1':'0'}" style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid #f59e0b;background:#f59e0b33;color:#f59e0b;cursor:pointer;opacity:${_da1Solar?'1':'0.35'}">☀ Solar</button>`;
  html += `<button onclick="toggleDa1RenewFuel('wind')" id="da1-wind" data-on="${_da1Wind?'1':'0'}" style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid #34d399;background:#34d39933;color:#34d399;cursor:pointer;opacity:${_da1Wind?'1':'0.35'}">💨 Wind</button>`;
  html += '</div>';
  html += '</div>';

  // ── Week-ahead section ────────────────────────────────────────────────────────
  html += '<div class="section-title" style="margin-top:16px">7-Day Ahead</div>';

  const hasSlowPasa = slowData && slowData.stpasa_demand && Object.keys(slowData.stpasa_demand).length > 0;

  if (!hasSlowPasa) {
    html += `<div class="week-chart-card"><div class="chart-title">7-Day Demand + Non-Sched Gen Forecast (ST PASA)</div><div class="spinner"><div class="spinner-icon">📡</div><br>Loading…</div></div>`;
    html += `<div class="week-chart-card" style="margin-top:8px"><div class="chart-title">7-Day Wind + Solar Forecast (ST PASA)</div><div class="spinner"><div class="spinner-icon">📡</div><br>Loading…</div></div>`;
  } else {
    html += `<div class="week-chart-card"><div class="chart-title">7-Day Demand + Non-Sched Gen — ST PASA 50%</div>`;
    html += `<div style="position:relative;height:200px"><canvas id="weekPasaChart"></canvas></div>`;
    html += chartPills('pasa', daPasaFilter);
    html += '</div>';

    html += `<div class="week-chart-card" style="margin-top:8px;margin-bottom:0"><div class="chart-title">7-Day Wind + Solar Forecast (ST PASA)</div>`;
    html += `<div style="position:relative;height:220px"><canvas id="weekRenewChart"></canvas></div>`;
    html += chartPills('renew', daRenewFilter);
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">';
    html += '<button onclick="toggleWeekRenewFuel(\'solar\')" id="wr-solar" data-on="0" style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid #f59e0b;background:#f59e0b33;color:#f59e0b;cursor:pointer;opacity:0.35">☀ Solar</button>';
    html += '<button onclick="toggleWeekRenewFuel(\'wind\')" id="wr-wind" data-on="1" style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid #34d399;background:#34d39933;color:#34d399;cursor:pointer">💨 Wind</button>';
    const wrDemandOn = window._wrDemand ? '1' : '0';
    const wrDemandOpacity = window._wrDemand ? '1' : '0.35';
    html += `<button onclick="toggleWeekRenewFuel('demand')" id="wr-demand" data-on="${wrDemandOn}" style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid #ffffff;background:transparent;color:#94a3b8;cursor:pointer;opacity:${wrDemandOpacity}">📊 Demand</button>`;
    html += '</div>';
    html += '</div>';
  }

  return html;
}

function drawDayAheadCharts(data) {
  const allSlots = [];
  for (let h = 0; h < 24; h++)
    for (let m = 0; m < 60; m += 30)
      allSlots.push((h<10?'0':'')+h+':'+(m<10?'0':'')+m);

  // ── Price chart ──────────────────────────────────────────────────────────────
  destroyChart('dayAheadPrice');
  const priceCtx = document.getElementById('dayAheadPriceChart');
  if (priceCtx) {
    const tmPrices = (data.tomorrow_prices) || {};
    const hasAnyPrice = REGIONS.some(r => (tmPrices[r] || []).length > 0);
    if (!hasAnyPrice) {
      priceCtx.closest('.chart-card').querySelector('.chart-title').textContent =
        'Price Forecast — predispatch data not yet available (~2hrs before midnight)';
    } else {
      const priceDatasets = [];
      for (const r of REGIONS) {
        const color = REGION_COLORS[r];
        const pm = {};
        (tmPrices[r] || []).forEach(p => { pm[p.interval] = p.rrp; });
        priceDatasets.push({
          label: REGION_SHORT[r], regionId: r,
          data: allSlots.map(l => pm[l] ?? null),
          borderColor: color, backgroundColor: color + 'cc',
          borderWidth: 1, pointRadius: 0, tension: 0.2, spanGaps: true, fill: false,
        });
      }
      charts.dayAheadPrice = new Chart(priceCtx, {
        type: 'line', data: { labels: allSlots, datasets: priceDatasets },
        options: { ...CHART_DEFAULTS,
          plugins: { ...CHART_DEFAULTS.plugins,
            legend: { display: true, labels:{color:'#94a3b8',font:{family:'Space Mono',size:9},boxWidth:10,padding:6} },
            tooltip: { ...CHART_DEFAULTS.plugins.tooltip, filter: i => i.raw !== null,
              callbacks: { label: c => c.raw === null ? null : ` ${c.dataset.label}: $${c.raw.toFixed(2)}/MWh` } }
          },
          scales: {
            x: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxRotation:0,
                   callback:(v,i) => i%2===0?allSlots[i]:null}, grid:{color:'#1e2d4544'} },
            y: { ticks:{color:'#94a3b8',font:{family:'Space Mono',size:9},callback:v=>'$'+v.toFixed(0)}, grid:{color:'#1e2d45'} }
          }
        }
      });
      priceDatasets.forEach((ds, i) => {
        if (!daPriceFilter.has(ds.regionId)) charts.dayAheadPrice.getDatasetMeta(i).hidden = true;
      });
      charts.dayAheadPrice.update();
    }
  }

  // ── Demand chart ─────────────────────────────────────────────────────────────
  destroyChart('dayAheadDemand');
  const demCtx = document.getElementById('dayAheadDemandChart');
  if (demCtx) {
    const tmDemandFast = (data.tomorrow_demand) || {};
    const tmDemandSlow = (slowData && slowData.tomorrow_demand_stpasa) || {};
    const mergedDemand = {};
    for (const r of REGIONS) {
      const m = {};
      (tmDemandSlow[r] || []).forEach(p => { m[p.interval] = p.demand; });
      (tmDemandFast[r] || []).forEach(p => { m[p.interval] = p.demand; });
      mergedDemand[r] = m;
    }
    const hasAny = REGIONS.some(r => Object.keys(mergedDemand[r]).length > 0);
    if (!hasAny) {
      demCtx.closest('.chart-card').querySelector('.chart-title').textContent =
        'Demand Forecast — loading… (ST PASA data arrives ~30 min after restart)';
    } else {
      const demDatasets = [];
      for (const r of REGIONS) {
        const color = REGION_COLORS[r];
        demDatasets.push({
          label: REGION_SHORT[r], regionId: r,
          data: allSlots.map(l => mergedDemand[r][l] ?? null),
          borderColor: color, backgroundColor: color + 'cc',
          borderWidth: 1, pointRadius: 0, tension: 0.2, spanGaps: true, fill: false,
        });
      }
      charts.dayAheadDemand = new Chart(demCtx, {
        type: 'line', data: { labels: allSlots, datasets: demDatasets },
        options: { ...CHART_DEFAULTS,
          plugins: { ...CHART_DEFAULTS.plugins,
            legend: { display: true, labels:{color:'#94a3b8',font:{family:'Space Mono',size:9},boxWidth:10,padding:6} },
            tooltip: { ...CHART_DEFAULTS.plugins.tooltip, filter: i => i.raw !== null,
              callbacks: { label: c => c.raw === null ? null : ` ${c.dataset.label}: ${fmt(c.raw,0)} MW` } }
          },
          scales: {
            x: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxRotation:0,
                   callback:(v,i) => i%2===0?allSlots[i]:null}, grid:{color:'#1e2d4544'} },
            y: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9}},
                 title:{display:true,text:'MW',color:'#64748b',font:{family:'Space Mono',size:9}},
                 grid:{color:'#1e293b'} }
          }
        }
      });
      demDatasets.forEach((ds, i) => {
        if (!daDemandFilter.has(ds.regionId)) charts.dayAheadDemand.getDatasetMeta(i).hidden = true;
      });
      charts.dayAheadDemand.update();
    }
  }

  // ── D+1 Wind + Solar chart (tomorrow from predispatch_gen) ────────────────
  const pdGen = (data && data.predispatch_gen) || {};
  if (Object.keys(pdGen).length) {
    const tomorrowAest = new Date(Date.now() + 10*3600*1000 + 86400*1000);
    const tStr = tomorrowAest.getUTCFullYear() + '-' +
      String(tomorrowAest.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(tomorrowAest.getUTCDate()).padStart(2,'0');
    const da1LabelSet = new Set();
    for (const r of REGIONS) (pdGen[r]||[]).forEach(p => { if (p.interval.startsWith(tStr)) da1LabelSet.add(p.interval); });
    const da1Labels = Array.from(da1LabelSet).sort();
    // Plain HH:MM labels for clean x-axis display
    const da1DisplayLabels = da1Labels.map(l => l.split(' ')[1] || l);
    console.log('[DA1 Renew] tStr:', tStr, 'tomorrow labels:', da1Labels.length);
    if (da1Labels.length) {
      const da1Datasets = [];
      const SOLAR_COLORS = {'QLD1':'#fbd07c','NSW1':'#90c8f0','VIC1':'#86e8b0','SA1':'#f0908a','TAS1':'#c49fd8'};
      for (const r of [...REGIONS].reverse()) {
        if (!da1RenewFilter.has(r)) continue;
        const solarMap = {}, windMap = {};
        (pdGen[r]||[]).forEach(p => {
          if (p.interval.startsWith(tStr)) {
            if (p.solar != null) solarMap[p.interval] = p.solar;
            if (p.wind  != null) windMap[p.interval]  = p.wind;
          }
        });
        if (Object.keys(solarMap).length && _da1Solar) da1Datasets.push({
          label: REGION_SHORT[r]+' Solar', regionId: r,
          data: da1Labels.map(l => solarMap[l] ?? null),
          borderColor: SOLAR_COLORS[r]||REGION_COLORS[r],
          backgroundColor: (SOLAR_COLORS[r]||REGION_COLORS[r])+'cc',
          borderWidth: 1, fill: 'origin', pointRadius: 0, tension: 0.2, spanGaps: true, stack: 'renew', yAxisID: 'y',
        });
        if (Object.keys(windMap).length && _da1Wind) da1Datasets.push({
          label: REGION_SHORT[r]+' Wind', regionId: r,
          data: da1Labels.map(l => windMap[l] ?? null),
          borderColor: REGION_COLORS[r], backgroundColor: REGION_COLORS[r]+'cc',
          borderWidth: 1.5, fill: 'stack', pointRadius: 0, tension: 0.2, spanGaps: true, stack: 'renew', yAxisID: 'y',
        });
      }
      destroyChart('da1Renew');
      const da1Ctx = document.getElementById('da1RenewChart');
      if (da1Ctx && da1Datasets.length) {
        charts.da1Renew = new Chart(da1Ctx, {
          type: 'line', data: { labels: da1DisplayLabels, datasets: da1Datasets },
          options: { ...CHART_DEFAULTS,
            plugins: { ...CHART_DEFAULTS.plugins,
              legend: { display: true, labels: { color:'#94a3b8', font:{family:'Space Mono',size:9}, boxWidth:10, padding:6,
                filter: item => item.datasetIndex === da1Datasets.findIndex(d => d.label === item.text)
              }},
              tooltip: { ...CHART_DEFAULTS.plugins.tooltip, filter: i => i.raw !== null,
                callbacks: { label: c => c.raw===null?null:` ${c.dataset.label}: ${fmt(c.raw)} MW` }
              }
            },
            scales: {
              x: { stacked: true, ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxRotation:0,
                autoSkip:true, maxTicksLimit:13,
                callback(v,i){ const l=this.getLabelForValue(i); return l&&l.endsWith(':00')?l:null; }
              }, grid:{color:'#1e2d4544'} },
              y: { stacked: true, ticks:{color:'#64748b',font:{family:'Space Mono',size:9}}, title:{display:true,text:'MW',color:'#64748b',font:{family:'Space Mono',size:9}}, grid:{color:'#1e293b'} }
            }
          }
        });
      }
    }
  }
}

function drawWeekCharts(fastData) {
  if (!slowData || !slowData.stpasa_demand) return;
  const pasa = slowData.stpasa_demand;

  // Build full label spine from all regions (use all 5 regardless of filter)
  const pasaLabelSet = new Set();
  for (const r of REGIONS) (pasa[r] || []).forEach(p => pasaLabelSet.add(p.interval));
  const pasaLabels = Array.from(pasaLabelSet).sort();
  if (!pasaLabels.length) return;

  const xTickCb = function(v, i) {
    const l = this.getLabelForValue(v);
    try {
      const d = new Date(l.replace(' ', 'T'));
      if (d.getHours() === 0 && d.getMinutes() === 0)
        return d.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short', timeZone:'Australia/Brisbane'});
    } catch(e) {}
    return null;
  };

  const tooltipTitle = ts => {
    try { const d = new Date(ts[0].label.replace(' ','T'));
      return d.toLocaleDateString('en-AU',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Australia/Brisbane'});
    } catch { return ts[0].label; }
  };

  // ── Demand + Non-Sched Gen chart ─────────────────────────────────────────
  const demDatasets = [];
  for (const r of REGIONS) {
    if (!weekRegionFilter.has(r)) continue;
    const color = REGION_COLORS[r];
    const pm = {};
    (pasa[r] || []).forEach(p => { if (p.demand_50 !== null) pm[p.interval] = p.demand_50; });
    demDatasets.push({
      label: REGION_SHORT[r],
      data: pasaLabels.map(l => pm[l] !== undefined ? pm[l] : null),
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 0, tension: 0.3, spanGaps: true
    });
  }

  destroyChart('weekPasa');
  const ctx1 = document.getElementById('weekPasaChart');
  if (ctx1 && demDatasets.length) {
    charts.weekPasa = new Chart(ctx1, {
      type: 'line',
      data: { labels: pasaLabels, datasets: demDatasets },
      options: { ...CHART_DEFAULTS,
        plugins: { ...CHART_DEFAULTS.plugins,
          legend: { display: true, labels: { color:'#94a3b8', font:{family:'Space Mono',size:9}, boxWidth:12, padding:8 } },
          tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
            callbacks: { label: c => c.raw !== null ? ` ${c.dataset.label}: ${fmt(c.raw)} MW` : null, title: tooltipTitle }
          }
        },
        scales: {
          x: { ticks: { color:'#64748b', font:{family:'Space Mono',size:8}, maxTicksLimit:10, maxRotation:0, callback: xTickCb }, grid:{color:'#1e2d4544'} },
          y: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9}}, title:{display:true,text:'MW',color:'#64748b',font:{family:'Space Mono',size:9}}, grid:{color:'#1e293b'} }
        }
      }
    });
  }

  // ── Wind + Solar UIGF + Demand line chart ────────────────────────────────
  const renewDatasets = [];
  const weekShowSolar = document.getElementById('wr-solar')?.dataset.on !== '0';
  const weekShowWind  = document.getElementById('wr-wind')?.dataset.on !== '0';

  // Stacked solar + wind areas per filtered region
  for (const r of [...REGIONS].reverse()) {
    if (!weekRenewFilter.has(r)) continue;
    const solarMap = {}, windMap = {};
    (pasa[r] || []).forEach(p => {
      if (p.solar_uigf != null) solarMap[p.interval] = p.solar_uigf;
      if (p.wind_uigf  != null) windMap[p.interval]  = p.wind_uigf;
    });
    if (Object.keys(solarMap).length > 0 && weekShowSolar) {
      renewDatasets.push({
        label: REGION_SHORT[r] + ' Solar', regionId: r, seriesType: 'solar',
        data: pasaLabels.map(l => solarMap[l] ?? null),
        borderColor: ({'QLD1':'#fbd07c','NSW1':'#90c8f0','VIC1':'#86e8b0','SA1':'#f0908a','TAS1':'#c49fd8'}[r] || REGION_COLORS[r]),
        backgroundColor: ({'QLD1':'#fbd07c','NSW1':'#90c8f0','VIC1':'#86e8b0','SA1':'#f0908a','TAS1':'#c49fd8'}[r] || REGION_COLORS[r]) + 'cc',
        borderWidth: 1, fill: 'origin', pointRadius: 0, tension: 0.2,
        spanGaps: true, stack: 'renew', yAxisID: 'y',
      });
    }
    if (Object.keys(windMap).length > 0 && weekShowWind) {
      renewDatasets.push({
        label: REGION_SHORT[r] + ' Wind', regionId: r, seriesType: 'wind',
        data: pasaLabels.map(l => windMap[l] ?? null),
        borderColor: REGION_COLORS[r], backgroundColor: REGION_COLORS[r] + 'cc',
        borderWidth: 1.5, fill: 'stack', pointRadius: 0, tension: 0.2,
        spanGaps: true, stack: 'renew', yAxisID: 'y',
      });
    }
  }

  // Demand line — sum of stpasa_demand demand_50 across active regions
  const weekShowDemand = document.getElementById('wr-demand')?.dataset.on !== '0';
  if (weekShowDemand) {
    const demLookup = {};
    for (const r of REGIONS) {
      if (!weekRenewFilter.has(r)) continue;
      (pasa[r] || []).forEach(p => {
        if (p.demand_50 != null)
          demLookup[p.interval] = (demLookup[p.interval] || 0) + p.demand_50;
      });
    }
    if (Object.keys(demLookup).length > 0) {
      renewDatasets.push({
        label: 'Demand',
        data: pasaLabels.map(l => demLookup[l] ?? null),
        borderColor: '#ffffff',
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.2,
        fill: false,
        order: 0,
        spanGaps: true,
        stack: undefined,
      });
    }
  }

  destroyChart('weekRenew');
  const ctx2 = document.getElementById('weekRenewChart');
  if (ctx2 && renewDatasets.length) {
    charts.weekRenew = new Chart(ctx2, {
      type: 'line',
      data: { labels: pasaLabels, datasets: renewDatasets },
      options: { ...CHART_DEFAULTS,
        plugins: { ...CHART_DEFAULTS.plugins,
          legend: { display: true, labels: { color:'#94a3b8', font:{family:'Space Mono',size:9}, boxWidth:10, padding:6,
            filter: item => item.datasetIndex === renewDatasets.findIndex(d => d.label === item.text)
          }},
          tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
            filter: i => i.raw !== null,
            callbacks: {
              label: c => {
                if (c.raw === null) return null;
                const lbl = c.dataset.label || '';
                return ` ${lbl} UIGF: ${fmt(c.raw)} MW`;
              },
              title: tooltipTitle
            }
          }
        },
        scales: {
          x: { stacked: true, ticks: { color:'#64748b', font:{family:'Space Mono',size:8}, maxTicksLimit:10, maxRotation:0, callback: xTickCb }, grid:{color:'#1e2d4544'} },
          y: { stacked: true, ticks:{color:'#64748b',font:{family:'Space Mono',size:9}}, title:{display:true,text:'MW',color:'#64748b',font:{family:'Space Mono',size:9}}, grid:{color:'#1e293b'} }
        }
      }
    });
  }

}

let dMinus1RegionFilter = 'NEM';

  dMinus1RegionFilter = r;
  // Update active pill
  document.querySelectorAll('.region-pill').forEach(b => b.classList.remove('active'));
  event && event.target && event.target.classList.add('active');

function renderPricesHist() {
  if (!window._priceHistActive) window._priceHistActive = new Set(REGIONS);

  let html = '<div class="section-title">Average Pool Prices</div>';

  // Status message for loading
  html += '<div id="prices-hist-status" style="font-family:var(--font-mono);font-size:10px;color:#475569;padding:4px 0 8px"></div>';

  // Summary table at top (populated by _renderPriceHistCharts)
  html += '<div id="prices-hist-table"></div>';

  return html;
}

function togglePriceHistNEM() {
  const allOn = REGIONS.every(r => window._priceHistActive.has(r));
  if (allOn) {
    window._priceHistActive.clear();
  } else {
    REGIONS.forEach(r => window._priceHistActive.add(r));
  }
  if (latestData) renderPanel('prices-hist', latestData);
  if (window._priceHistData) setTimeout(() => _renderPriceHistCharts(window._priceHistData, latestData), 50);
}

function togglePriceHistRegion(r) {
  if (window._priceHistActive.has(r)) {
    window._priceHistActive.delete(r);
  } else {
    window._priceHistActive.add(r);
  }
  if (latestData) renderPanel('prices-hist', latestData);
  if (window._priceHistData) setTimeout(() => _renderPriceHistCharts(window._priceHistData, latestData), 50);
}

async function drawPricesHist() {
  if (window._priceHistData) {
    _renderPriceHistCharts(window._priceHistData, latestData);
    return;
  }
  const status = document.getElementById('prices-hist-status');
  if (status) status.textContent = 'Loading historical price data… (first load takes ~30s)';
  try {
    const data = await fetch('/api/historical_price_averages').then(r => r.json());
    if (data.error) { if (status) status.textContent = `Error: ${data.error}`; return; }
    window._priceHistData = data;
    if (status) status.textContent = '';
    _renderPriceHistCharts(data, latestData);
  } catch(e) {
    if (status) status.textContent = `Error: ${e.message}`;
  }
}

function _renderPriceHistCharts(data, liveData) {
  if (!window._priceHistActive) window._priceHistActive = new Set(REGIONS);
  const regions = REGIONS.filter(r => window._priceHistActive.has(r));

  // Collect all days sorted ascending
  const allDays = new Set();
  for (const r of REGIONS) Object.keys(data[r] || {}).forEach(d => allDays.add(d));
  const days = Array.from(allDays).sort();

  // ── Summary table — Today / MTD / QTD ──────────────────────────────────
  const tableDiv = document.getElementById('prices-hist-table');
  if (!tableDiv) return;

  const allRegions = REGIONS;         // summary table always shows all regions
  const visRegions = regions.length ? regions : REGIONS;  // chart + daily table respect filter
  const daysDesc = [...days].reverse();

  // Build today's predispatch intervals (future periods for today only)
  // predispatch_prices[region] = [{interval: "HH:MM", rrp: N}, ...]
  // These are 30-min intervals, each counts once toward the daily average
  const nowUTC = new Date();
  const aestMs = nowUTC.getTime() + 10 * 3600 * 1000;
  const aestDate = new Date(aestMs);
  const todayStr = aestDate.getUTCFullYear() + '-' +
    String(aestDate.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(aestDate.getUTCDate()).padStart(2,'0');
  const nowTimeStr = String(aestDate.getUTCHours()).padStart(2,'0') + ':' +
    String(aestDate.getUTCMinutes()).padStart(2,'0');

  // Quarter start: Q1=Jan, Q2=Apr, Q3=Jul, Q4=Oct
  const aestMonth = aestDate.getUTCMonth();
  const aestYear  = aestDate.getUTCFullYear();
  const qMonth    = Math.floor(aestMonth / 3) * 3;
  const qStartStr = aestYear + '-' + String(qMonth + 1).padStart(2,'0') + '-01';
  const mStartStr = aestYear + '-' + String(aestMonth + 1).padStart(2,'0') + '-01';
  const qLabels   = ['Q1','Q2','Q3','Q4'];
  const qLabel    = qLabels[Math.floor(aestMonth/3)] + ' ' + aestYear;
  const mLabel    = aestDate.toLocaleDateString('en-AU', {timeZone:'UTC', month:'short', year:'numeric'});

  // PD future intervals for today by region (30-min each, future only)
  const pdByRegion = {};
  if (liveData?.predispatch_prices) {
    for (const r of REGIONS) {
      pdByRegion[r] = (liveData.predispatch_prices[r] || [])
        .filter(p => p.interval > nowTimeStr)
        .map(p => p.rrp);
    }
  }

  const CAP = 300;
  // _stats: weighted average where each entry has {price, weight}
  // weight=1 for 30-min intervals, weight=1/6 for 5-min intervals
  // Weighted aggregation across days
  // Each day contributes proportionally to its effective interval count (30-min equivalent)
  // 5-min data (count>100): effective weight = count/6  (288 intervals → 48 equivalent 30-min)
  // 30-min data (count≤100): effective weight = count
  // energy_avg and cap_avg are pre-computed per day from raw prices in scraper → use directly
  const _agg = (daySet) => {
    const out = {};
    for (const r of allRegions) {
      const rd = data[r] || {};
      let totW = 0, sumAvg = 0, sumEnergy = 0, sumCap = 0;
      let pdPrices = [];

      for (const d of daySet) {
        const dp = rd[d];
        if (!dp || !dp.count) continue;
        const effW = dp.count > 100 ? dp.count / 6 : dp.count;  // 30-min equivalent intervals
        totW     += effW;
        sumAvg   += dp.avg         * effW;
        sumEnergy += dp.energy_avg * effW;
        sumCap   += dp.cap_avg     * effW;
        // Collect PD future prices for today
        if (d === todayStr) pdPrices = pdByRegion[r] || [];
      }

      // Blend in predispatch for today's remaining intervals (30-min each)
      for (const p of pdPrices) {
        totW      += 1;
        sumAvg    += p;
        sumEnergy += Math.min(p, CAP);
        sumCap    += Math.max(0, p - CAP);
      }

      if (!totW) { out[r] = null; continue; }
      out[r] = {
        avg:        Math.round(sumAvg    / totW * 100) / 100,
        energy_avg: Math.round(sumEnergy / totW * 100) / 100,
        cap_avg:    Math.round(sumCap    / totW * 100) / 100,
      };
    }
    return out;
  };

  const todayDays  = days.filter(d => d === todayStr);
  const mtdDays    = days.filter(d => d >= mStartStr && d <= todayStr);
  const qtdDays    = days.filter(d => d >= qStartStr && d <= todayStr);

  const _fmtPrice = v => v === null ? '—' : `$${v.toFixed(2)}`;

  const _buildSection = (label, aggData) => {
    let s = `<tr><td colspan="${allRegions.length + 1}" style="padding:8px 8px 4px;font-family:var(--font-mono);font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;border-top:1px solid #1e2d45">${label}</td></tr>`;
    s += '<tr>';
    s += '<td style="padding:4px 8px;color:#94a3b8;font-family:var(--font-mono);font-size:10px">Flat avg</td>';
    for (const r of allRegions) {
      const v = aggData[r]?.avg ?? null;
      const col = REGION_COLORS[r];
      s += `<td style="text-align:right;padding:4px 8px;font-family:var(--font-mono);font-size:10px;color:${col};font-weight:600">${_fmtPrice(v)}</td>`;
    }
    s += '</tr>';
    s += '<tr>';
    s += '<td style="padding:4px 8px;color:#475569;font-family:var(--font-mono);font-size:10px">Energy avg</td>';
    for (const r of allRegions) {
      const v = aggData[r]?.energy_avg ?? null;
      const col = REGION_COLORS[r];
      s += `<td style="text-align:right;padding:4px 8px;font-family:var(--font-mono);font-size:10px;color:${col}">${_fmtPrice(v)}</td>`;
    }
    s += '</tr>';
    s += '<tr>';
    s += '<td style="padding:4px 8px 8px;color:#475569;font-family:var(--font-mono);font-size:10px">Cap est</td>';
    for (const r of allRegions) {
      const v = aggData[r]?.cap_avg ?? null;
      const col = REGION_COLORS[r];
      s += `<td style="text-align:right;padding:4px 8px 8px;font-family:var(--font-mono);font-size:10px;color:${col}">${_fmtPrice(v)}</td>`;
    }
    s += '</tr>';
    return s;
  };

  // Cap min: cap payout averaged over the FULL month/quarter period,
  // with future periods assumed to pay zero (uses total intervals in period, not just actuals)
  // Assumes 48 x 30-min intervals per day
  const _capMin = (daySet, periodStartStr, periodEndStr) => {
    const out = {};
    // Total days in the full period (actuals + future)
    const allPeriodDays = [];
    const sd = new Date(periodStartStr + 'T00:00:00');
    const ed = new Date(periodEndStr   + 'T00:00:00');
    for (let dt = new Date(sd); dt <= ed; dt.setDate(dt.getDate()+1))
      allPeriodDays.push(dt.toISOString().slice(0,10));
    const totalIntervalsInPeriod = allPeriodDays.length * 48; // 48 x 30-min per day

    for (const r of allRegions) {
      const rd = data[r] || {};
      let sumCap = 0;
      for (const d of daySet) {
        const dp = rd[d];
        if (!dp || !dp.count) continue;
        const effW = dp.count > 100 ? dp.count / 6 : dp.count;
        sumCap += dp.cap_avg * effW;
      }
      // PD for today (future intervals within the period)
      for (const p of (pdByRegion[r] || [])) sumCap += Math.max(0, p - CAP);
      // Divide by TOTAL intervals in period (future assumed zero)
      out[r] = totalIntervalsInPeriod > 0
        ? { cap_min: Math.round(sumCap / totalIntervalsInPeriod * 100) / 100 }
        : null;
    }
    return out;
  };

  // Period end strings for month and quarter
  const lastDayOfMonth = new Date(aestYear, aestMonth + 1, 0);
  const mEndStr = lastDayOfMonth.getUTCFullYear
    ? lastDayOfMonth.toISOString().slice(0,10)
    : `${aestYear}-${String(aestMonth+1).padStart(2,'0')}-${String(lastDayOfMonth.getDate()).padStart(2,'0')}`;
  const qEndMonth = qMonth + 2; // last month of quarter (0-indexed)
  const lastDayOfQ = new Date(aestYear, qEndMonth + 1, 0);
  const qEndStr = `${aestYear}-${String(qEndMonth+1).padStart(2,'0')}-${String(lastDayOfQ.getDate()).padStart(2,'0')}`;

  const _buildSectionWithCapMin = (label, aggData, capMinData) => {
    let s = _buildSection(label, aggData);
    s += '<tr>';
    s += '<td style="padding:2px 8px 8px;color:#475569;font-family:var(--font-mono);font-size:10px">Cap min</td>';
    for (const r of allRegions) {
      const v = capMinData[r]?.cap_min ?? null;
      const col = REGION_COLORS[r];
      s += `<td style="text-align:right;padding:2px 8px 8px;font-family:var(--font-mono);font-size:10px;color:${col}">${v === null ? '—' : '$'+v.toFixed(2)}</td>`;
    }
    s += '</tr>';
    return s;
  };

  let t = '<div class="chart-card" style="padding:12px 14px;margin-bottom:8px;overflow-x:auto">';
  t += '<div class="chart-title" style="margin-bottom:10px">Pool Price Summary ($/MWh)</div>';
  t += '<table style="width:100%;border-collapse:collapse">';
  t += '<tr><th style="text-align:left;padding:5px 8px;color:#64748b;font-family:var(--font-mono);font-size:9px;border-bottom:1px solid #334155"></th>';
  for (const r of allRegions) {
    const col = REGION_COLORS[r];
    t += `<th style="text-align:right;padding:5px 8px;color:${col};font-family:var(--font-mono);font-size:10px;border-bottom:1px solid #334155">${REGION_SHORT[r]}</th>`;
  }
  t += '</tr>';

  t += _buildSection(`Today — ${todayStr}`, _agg(todayDays));
  t += _buildSectionWithCapMin(`Month — ${mLabel}`, _agg(mtdDays),
    _capMin(mtdDays, mStartStr, mEndStr));
  t += _buildSectionWithCapMin(`Quarter — ${qLabel}`, _agg(qtdDays),
    _capMin(qtdDays, qStartStr, qEndStr));

  t += '</table>';
  t += '<div style="font-family:var(--font-mono);font-size:8px;color:#475569;margin-top:8px">Calculated on 30-min half-hourly trading intervals · Flat avg = simple $/MWh · Energy avg = avg(min(p,$300)) · Cap est = avg(max(0,p−$300)) actuals+PD · Cap min = cap payout avg over full period (future=0) · Today includes predispatch</div>';
  t += '</div>';

  // Daily breakdown table
  if (!window._priceHistRegion) window._priceHistRegion = 'NSW1';
  if (window._todCapPrices === undefined) window._todCapPrices = true;

  const TOD_COLS = [
    {key:'avg',         label:'All Day',   sub:'',          color:'#ffffff'},
    {key:'overnight',   label:'Overnight', sub:'12am–6am',  color:'#94a3b8'},
    {key:'morning',     label:'Morn Peak', sub:'6am–10am',  color:'#7f8ea3'},
    {key:'midday',      label:'Midday',    sub:'10am–4pm',  color:'#b0bec5'},
    {key:'evening',     label:'Eve Peak',  sub:'4pm–8pm',   color:'#64748b'},
    {key:'late_evening',label:'Late Eve',  sub:'8pm–12am',  color:'#8899a8'},
  ];

  // Limit to 60 days
  const todDays = daysDesc.slice(0, 60);
  const todDaysAsc = [...todDays].reverse();

  t += '<div class="chart-card" style="padding:12px 14px;margin-top:8px;overflow-x:auto">';
  t += '<div class="chart-title" style="margin-bottom:8px">Daily Average by Time of Day ($/MWh)</div>';

  const selRegion = window._priceHistRegion;
  const selCol    = REGION_COLORS[selRegion] || '#94a3b8';

  // State selector buttons
  t += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  for (const r of allRegions) {
    const col = REGION_COLORS[r];
    const active = window._priceHistRegion === r;
    t += `<button onclick="window._priceHistRegion='${r}';_renderPriceHistCharts(window._priceHistData,window._liveDataRef)"
      style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;cursor:pointer;
      border:1px solid ${col};background:${active?col+'33':'transparent'};color:${active?col:col+'88'};
      font-weight:${active?'700':'400'}">${REGION_SHORT[r]}</button>`;
  }
  t += '</div>';

  // Cap prices button — always white
  const capOn = window._todCapPrices;
  t += `<div style="margin-bottom:12px">
    <button onclick="window._todCapPrices=!window._todCapPrices;_renderPriceHistCharts(window._priceHistData,window._liveDataRef)"
      style="font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:20px;cursor:pointer;
      border:1px solid ${capOn?'#ffffff':'#475569'};background:${capOn?'#ffffff22':'transparent'};
      color:${capOn?'#ffffff':'#64748b'}">
      ${capOn?'✓ ':''} Cap prices at $300
    </button>
  </div>`;

  // TOD chart
  t += '<div id="todLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>';
  t += '<div class="chart-container" style="height:240px;margin-bottom:12px"><canvas id="todChart"></canvas></div>';

  t += '<table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px">';
  t += '<tr>';
  t += '<th style="text-align:left;padding:5px 8px;color:#64748b;border-bottom:1px solid #1e2d45;white-space:nowrap">Date</th>';
  for (const col of TOD_COLS) {
    t += `<th style="text-align:right;padding:5px 4px;color:#64748b;border-bottom:1px solid #1e2d45;white-space:nowrap;font-size:9px">
      ${col.label}${col.sub?`<br><span style="color:#334155;font-weight:400">${col.sub}</span>`:''}
    </th>`;
  }
  t += '</tr>';

  const minCounts = {avg:0, overnight:20, morning:14, midday:20, evening:14, late_evening:14};

  for (const d of todDays) {
    const ddt    = new Date(d + 'T00:00:00');
    const label  = ddt.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'});
    const isToday = d === todayStr;
    const dp     = data[selRegion]?.[d];
    t += `<tr style="cursor:pointer" onclick="openDayPriceModal('${d}')" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">`;
    t += `<td style="padding:5px 8px;color:#94a3b8;border-bottom:1px solid #1e2d4533;white-space:nowrap">${label}${isToday?' <span style="color:#64748b;font-size:8px">partial</span>':''}</td>`;
    for (const col of TOD_COLS) {
      const cnt = col.key === 'avg' ? dp?.count : dp?.tod_count?.[col.key];
      const enoughData = !isToday || col.key === 'avg' || (cnt !== undefined && cnt >= minCounts[col.key]);
      let val;
      if (col.key === 'avg') {
        val = capOn ? dp?.energy_avg : dp?.avg;
      } else {
        val = capOn ? dp?.tod_energy?.[col.key] : dp?.tod?.[col.key];
      }
      const hasVal = enoughData && val !== undefined && val !== null;
      const isSelectedCol = window._selectedTod === col.key;
      const cellCol = !hasVal ? '#334155' : isSelectedCol ? '#fbbf24' : selCol;
      t += `<td style="text-align:right;padding:5px 4px;color:${cellCol};border-bottom:1px solid #1e2d4533;font-weight:${isSelectedCol&&hasVal?'700':'400'}">${hasVal ? '$'+val.toFixed(2) : '—'}</td>`;
    }
    t += '</tr>';
  }
  t += '</table></div>';

  tableDiv.innerHTML = t;

  // Draw TOD chart
  const todCtx = document.getElementById('todChart');
  if (todCtx) {
    destroyChart('tod');
    const todLabels = todDaysAsc.map(d => {
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-AU', {day:'numeric', month:'short'});
    });
    const todDatasets = TOD_COLS.map(col => {
      const dp_data = todDaysAsc.map(d => {
        const dp = data[selRegion]?.[d];
        const isToday = d === todayStr;
        const cnt = col.key === 'avg' ? dp?.count : dp?.tod_count?.[col.key];
        const enoughData = !isToday || col.key === 'avg' || (cnt !== undefined && cnt >= minCounts[col.key]);
        if (!enoughData) return null;
        if (col.key === 'avg') return capOn ? (dp?.energy_avg ?? null) : (dp?.avg ?? null);
        return capOn ? (dp?.tod_energy?.[col.key] ?? null) : (dp?.tod?.[col.key] ?? null);
      });
      return {
        label: col.label, _key: col.key, _baseColor: col.color,
        data: dp_data,
        borderColor: col.color, backgroundColor: 'transparent',
        borderWidth: col.key === 'avg' ? 2 : 1.5,
        pointRadius: 0, tension: 0.3, spanGaps: false,
      };
    });

    let _selectedTod = window._selectedTod || null;
    const _applyTodStyle = () => {
      const c = charts.tod;
      if (!c) return;
      const SEL_COLOR = '#fbbf24'; // yellow when selected
      c.data.datasets.forEach((ds, i) => {
        const isSel = _selectedTod === null || ds._key === _selectedTod;
        const isHighlighted = _selectedTod !== null && ds._key === _selectedTod;
        ds.borderWidth = isSel ? (ds._key === 'avg' ? 3 : 2.5) : 1;
        ds.borderColor = isHighlighted ? SEL_COLOR : (isSel ? ds._baseColor : ds._baseColor + '33');
      });
      // Update button styles
      const container = document.getElementById('todLegend');
      if (container) container.querySelectorAll('button').forEach(btn => {
        const key = btn.dataset.key;
        const col = btn.dataset.color;
        const isSel = _selectedTod === null || key === _selectedTod;
        const isHighlighted = _selectedTod !== null && key === _selectedTod;
        const displayCol = isHighlighted ? '#fbbf24' : col;
        btn.style.background    = isSel ? displayCol+'22' : 'transparent';
        btn.style.borderColor   = isSel ? displayCol : col+'44';
        btn.style.color         = isSel ? displayCol : col+'44';
        btn.style.fontWeight    = isHighlighted ? '700' : '400';
      });
      c.update('none');
    };

    charts.tod = new Chart(todCtx, {
      type: 'line',
      data: { labels: todLabels, datasets: todDatasets },
      options: { ...CHART_DEFAULTS,
        plugins: { ...CHART_DEFAULTS.plugins,
          legend: { display: false },
          tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
            callbacks: { label: c => c.raw === null ? null : ` ${c.dataset.label}: $${c.raw.toFixed(2)}/MWh` }
          }
        },
        scales: {
          x: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxRotation:45,autoSkip:true,maxTicksLimit:12}, grid:{color:'#1e2d4544'} },
          y: { ticks:{color:'#94a3b8',font:{family:'Space Mono',size:9},callback:v=>'$'+v.toFixed(0)}, grid:{color:'#1e2d45'}, beginAtZero:false }
        }
      }
    });

    // Build button legend
    const todLegend = document.getElementById('todLegend');
    if (todLegend) {
      todLegend.innerHTML = '';
      TOD_COLS.forEach(col => {
        const btn = document.createElement('button');
        btn.dataset.key   = col.key;
        btn.dataset.color = col.color;
        const isAlreadySel = _selectedTod === col.key;
        const displayCol = isAlreadySel ? '#fbbf24' : col.color;
        btn.style.cssText = `font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid ${displayCol};background:${displayCol}22;color:${displayCol};transition:all 0.15s;white-space:nowrap;font-weight:${isAlreadySel?'700':'400'}`;
        btn.textContent = col.label;
        btn.onclick = () => {
          _selectedTod = (_selectedTod === col.key) ? null : col.key;
          window._selectedTod = _selectedTod;
          // Re-render redraws chart + table with correct selection state
          _renderPriceHistCharts(window._priceHistData, window._liveDataRef);
        };
        todLegend.appendChild(btn);
      });
    }
    // Restore selection state if a TOD was previously selected
    if (_selectedTod) _applyTodStyle();
  }

  // Store liveData ref for re-render on region switch
  window._liveDataRef = liveData;
}

// ── Gas Page ──────────────────────────────────────────────────────────────────

const GAS_HUBS = ['Adelaide', 'Brisbane', 'Sydney'];
const GAS_HUB_COLORS = { Adelaide: '#e74c3c', Brisbane: '#f39c12', Sydney: '#3498db' };
let _gasData = null;

function renderGas() {
  let html = '<div class="section-title">Gas Markets</div>';
  html += '<div style="font-family:var(--font-mono);font-size:9px;color:#475569;margin-bottom:12px">STTM (Adelaide · Brisbane · Sydney) + VicGas DWGM</div>';
  html += `<div id="gas-content">`;
  if (!_gasData) {
    html += '<div id="gas-loading" style="font-family:var(--font-mono);font-size:10px;color:#475569;padding:16px 0">Loading gas data…</div>';
  } else {
    html += _renderGasContent(_gasData);
  }
  html += '</div>';
  return html;
}

function _renderGasContent(gas) {
  const sttm   = gas.sttm   || {};
  const vicgas = gas.vicgas || {};
  const today  = sttm.today || {};
  let html = '';

  // ── Price cards ──
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">';
  for (const hub of GAS_HUBS) {
    const d   = today[hub] || {};
    const col = GAS_HUB_COLORS[hub];
    const px  = d.price != null ? `$${d.price.toFixed(2)}/GJ` : '—';
    const dem = d.demand_tj != null ? `${d.demand_tj.toFixed(1)} TJ` : '';
    html += `<div class="chart-card" style="padding:10px 12px">
      <div style="font-size:9px;color:${col};font-family:var(--font-mono);font-weight:700">${hub} STTM</div>
      <div style="font-size:18px;font-family:var(--font-mono);font-weight:700;color:var(--text)">${px}</div>
      ${dem ? `<div style="font-size:9px;color:#64748b;margin-top:2px">${dem} today</div>` : ''}
    </div>`;
  }
  // VicGas price + demand
  const vicPx  = vicgas.today_price != null ? `$${vicgas.today_price.toFixed(2)}/GJ` : '—';
  const vicDem = vicgas.today_demand_tj != null ? `${vicgas.today_demand_tj.toFixed(1)} TJ` : '';
  html += `<div class="chart-card" style="padding:10px 12px">
    <div style="font-size:9px;color:#2ed573;font-family:var(--font-mono);font-weight:700">Victoria DWGM</div>
    <div style="font-size:18px;font-family:var(--font-mono);font-weight:700;color:var(--text)">${vicPx}</div>
    ${vicDem ? `<div style="font-size:9px;color:#64748b;margin-top:2px">${vicDem} today</div>` : ''}
  </div>`;
  html += '</div>';

  // ── VicGas intraday price ──
  if (vicgas.intraday && vicgas.intraday.length > 0) {
    html += '<div class="chart-card" style="margin-bottom:8px">' +
      '<div class="chart-title">VicGas Indicative Price Today ($/GJ)</div>' +
      '<div class="chart-container" style="height:160px"><canvas id="gasVicIntradayChart"></canvas></div>' +
      '</div>';
  }

  // ── 14-day price history ──
  html += '<div class="chart-card">' +
    '<div class="chart-title">14-Day Price History ($/GJ)</div>' +
    '<div class="chart-container" style="height:220px"><canvas id="gasPriceHistChart"></canvas></div>' +
    '</div>';

  // ── GBB storage + state summary (loaded separately) ──
  html += '<div id="gbb-content">';
  html += '<div style="font-family:var(--font-mono);font-size:10px;color:#475569;padding:12px 0">Loading storage data…</div>';
  html += '</div>';

  return html;
}

function _drawGasCharts(gas) {
  const sttm   = gas.sttm   || {};
  const vicgas = gas.vicgas || {};

  // VicGas intraday
  const intraday = vicgas.intraday || [];
  if (intraday.length && document.getElementById('gasVicIntradayChart')) {
    destroyChart('gasVicIntraday');
    charts.gasVicIntraday = new Chart(document.getElementById('gasVicIntradayChart'), {
      type: 'line',
      data: {
        labels: intraday.map(p => p.time),
        datasets: [{
          label: 'VicGas $/GJ',
          data: intraday.map(p => p.price),
          borderColor: '#2ed573', backgroundColor: '#2ed57322',
          borderWidth: 1.5, pointRadius: 3, tension: 0.2, fill: true,
        }]
      },
      options: { ...CHART_DEFAULTS,
        plugins: { ...CHART_DEFAULTS.plugins, legend: { display: false },
          tooltip: { ...CHART_DEFAULTS.plugins.tooltip, callbacks: { label: c => ` $${c.raw.toFixed(2)}/GJ` } }
        },
        scales: {
          x: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9}}, grid:{color:'#1e2d4544'} },
          y: { ticks:{color:'#94a3b8',font:{family:'Space Mono',size:9},callback:v=>'$'+v.toFixed(2)}, grid:{color:'#1e2d45'}, beginAtZero:false }
        }
      }
    });
  }

  // 14-day price history
  const hist    = sttm.history || [];
  const vicHist = vicgas.history || [];
  if ((hist.length || vicHist.length) && document.getElementById('gasPriceHistChart')) {
    destroyChart('gasPriceHist');
    const allDates = [...new Set([...hist.map(d=>d.gas_date), ...vicHist.map(d=>d.gas_date)])].sort();
    const vicMap   = Object.fromEntries(vicHist.map(d=>[d.gas_date, d.price]));
    const datasets = GAS_HUBS.map(hub => ({
      label: hub,
      data: allDates.map(d => { const e = hist.find(h=>h.gas_date===d); return e?.[hub]?.price ?? null; }),
      borderColor: GAS_HUB_COLORS[hub], backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 2, tension: 0.2,
    }));
    datasets.push({
      label: 'Victoria',
      data: allDates.map(d => vicMap[d] ?? null),
      borderColor: '#2ed573', backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 2, tension: 0.2,
    });
    const dayLabels = allDates.map(d => {
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-AU', {day:'numeric', month:'short'});
    });
    charts.gasPriceHist = new Chart(document.getElementById('gasPriceHistChart'), {
      type: 'line',
      data: { labels: dayLabels, datasets },
      options: { ...CHART_DEFAULTS,
        plugins: { ...CHART_DEFAULTS.plugins,
          legend: { display: true, labels: { color:'#94a3b8', font:{family:'Space Mono',size:9}, boxWidth:10, padding:6 } },
          tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
            callbacks: { label: c => c.raw===null?null:` ${c.dataset.label}: $${c.raw.toFixed(2)}/GJ` } }
        },
        scales: {
          x: { ticks:{color:'#64748b',font:{family:'Space Mono',size:9},maxRotation:45,autoSkip:true,maxTicksLimit:10}, grid:{color:'#1e2d4544'} },
          y: { ticks:{color:'#94a3b8',font:{family:'Space Mono',size:9},callback:v=>'$'+v.toFixed(2)}, grid:{color:'#1e2d45'}, beginAtZero:false }
        }
      }
    });
  }
}

function round2(v) { return Math.round(v * 100) / 100; }

// ── GBB Storage + State Summary ───────────────────────────────────────────────

const STOR_COLORS = {
  'Iona UGS':      '#2ed573',
  'Moomba Storage':'#f39c12',
  'RUGS':          '#3498db',
  'SSSF':          '#9b59b6',
  'Dandenong LNG': '#e74c3c',
  'NGS':           '#1abc9c',
};
const STATE_ORDER = ['QLD', 'NSW', 'VIC', 'SA', 'TAS', 'NT'];

let _gbbData = null;

async function fetchGBBData() {
  try {
    const resp = await fetch('/api/gbb');
    if (!resp.ok) return;
    _gbbData = await resp.json();
    console.log('[GBB] keys:', Object.keys(_gbbData), 
      'prod:', Object.keys(_gbbData.production_history||{}).length,
      'demand:', Object.keys(_gbbData.demand_by_sector||{}).length,
      'pipe:', Object.keys(_gbbData.pipeline_flows||{}).length,
      'storage:', Object.keys(_gbbData.storage||{}).length);
    _renderGBB(_gbbData);
  } catch(e) {
    console.warn('GBB fetch failed:', e);
  }
}

function _renderGBB(gbb) {
  const el = document.getElementById('gbb-content');
  if (!el) return;
  const storage = gbb.storage || {};
  const stateSum = gbb.state_summary || {};
  const latestDate = gbb.latest_date || '';
  const forecastDates = new Set(gbb.forecast_dates || []);
  const partialDates  = new Set(gbb.partial_dates  || []);
  let html = '';

  // ── Disclaimer ──
  html += `<div style="font-family:var(--font-mono);font-size:9px;color:#475569;padding:8px 10px;background:#1e293b;border-radius:6px;margin-bottom:8px;border-left:2px solid #334155">
    Data sourced from AEMO GasBB (GasBBActualFlowStorageLast31). State supply &amp; demand totals are approximate and may not exactly match the GasBB Bulletin Board calculations.
  </div>`;

  // ── State supply/demand summary table ──
  html += '<div class="chart-card" style="margin-top:8px;padding:12px 14px">';
  html += `<div class="chart-title">East Coast Gas — Supply & Demand by State`;
  if (latestDate) html += ` <span style="font-weight:400;color:#475569">${latestDate.replace(/\//g,'-')}</span>`;
  html += ` <span style="font-weight:400;color:#334155;font-size:9px"> · last complete day</span>`;
  html += '</div>';
  html += '<table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px;margin-top:8px">';
  html += '<thead><tr style="color:#475569;border-bottom:1px solid #1e2d45">' +
    '<th style="text-align:left;padding:4px 0">State</th>' +
    '<th style="text-align:right;padding:4px 6px">Supply TJ</th>' +
    '<th style="text-align:right;padding:4px 6px">Demand TJ</th>' +
    '<th style="text-align:right;padding:4px 0">Net TJ</th>' +
    '</tr></thead><tbody>';
  let totS = 0, totD = 0;
  for (const st of STATE_ORDER) {
    const v = stateSum[st];
    if (!v) continue;
    totS += v.supply; totD += v.demand;
    const net = v.net;
    const netCol = net >= 0 ? '#2ed573' : '#e74c3c';
    html += `<tr style="border-bottom:1px solid #1e2d4533">
      <td style="padding:5px 0;color:#94a3b8">${st}</td>
      <td style="text-align:right;padding:5px 6px;color:var(--text)">${v.supply.toFixed(0)}</td>
      <td style="text-align:right;padding:5px 6px;color:var(--text)">${v.demand.toFixed(0)}</td>
      <td style="text-align:right;padding:5px 0;color:${netCol};font-weight:700">${net >= 0 ? '+' : ''}${net.toFixed(0)}</td>
    </tr>`;
  }
  const totNet = totS - totD;
  const totCol = totNet >= 0 ? '#2ed573' : '#e74c3c';
  html += `<tr style="border-top:1px solid #334155;font-weight:700">
    <td style="padding:6px 0;color:var(--text)">TOTAL</td>
    <td style="text-align:right;padding:6px 6px;color:var(--text)">${totS.toFixed(0)}</td>
    <td style="text-align:right;padding:6px 6px;color:var(--text)">${totD.toFixed(0)}</td>
    <td style="text-align:right;padding:6px 0;color:${totCol};font-weight:700">${totNet >= 0 ? '+' : ''}${totNet.toFixed(0)}</td>
  </tr>`;
  html += '</tbody></table></div>';

  // ── Production by facility ──
  html += '<div class="chart-card" style="margin-top:8px">' +
    '<div class="chart-title">Gas Production by Source — 30 Days (TJ/day)</div>' +
    `<div style="font-family:var(--font-mono);font-size:8px;color:#475569;margin:-4px 0 6px">Actuals to prior complete day · dashed = nominations (D+0 to D+6)</div>` +
    '<div id="gbbProdLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>' +
    '<div class="chart-container" style="height:240px"><canvas id="gbbProductionChart"></canvas></div>' +
    '</div>';

  // ── Demand by sector ──
  html += '<div class="chart-card" style="margin-top:8px">' +
    '<div class="chart-title">Gas Demand by Sector — 30 Days (TJ/day)</div>' +
    `<div style="font-family:var(--font-mono);font-size:8px;color:#475569;margin:-4px 0 6px">LNG export · residential & commercial · large industrial · gas generation · actuals settle D+1</div>` +
    '<div id="gbbDemLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>' +
    '<div class="chart-container" style="height:240px"><canvas id="gbbDemandSectorChart"></canvas></div>' +
    '</div>';

  // ── Pipeline flows ──
  html += '<div class="chart-card" style="margin-top:8px">' +
    '<div class="chart-title">Key Pipeline Flows — 30 Days (TJ/day)</div>' +
    `<div style="font-family:var(--font-mono);font-size:8px;color:#475569;margin:-4px 0 6px">Actuals to prior complete day · dashed = nominations (D+0 to D+6)</div>` +
    '<div id="gbbPipeLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>' +
    '<div class="chart-container" style="height:240px"><canvas id="gbbPipelineChart"></canvas></div>' +
    '</div>';

  // ── Storage levels ──
  html += '<div class="chart-card" style="margin-top:8px">' +
    '<div class="chart-title">Gas Storage Levels — 31 Days (TJ)</div>' +
    '<div id="gbbStorLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>' +
    '<div class="chart-container" style="height:220px"><canvas id="gbbStorageChart"></canvas></div>' +
    '</div>';

  el.innerHTML = html;

  setTimeout(() => {
    try {
    // ── Shared helpers ──
    const _dateLabels = dates => dates.map(d => new Date(d + 'T00:00:00').toLocaleDateString('en-AU', {day:'numeric', month:'short'}));
    const _allDates = arrs => [...new Set(arrs.flatMap(pts => pts.map(p => p.gas_date)))].sort();
    const _makeChart = (id, key, data, labels, opts, type='line') => {
      const ctx = document.getElementById(id); if (!ctx) return;
      destroyChart(key);
      charts[key] = new Chart(ctx, {type, data: {labels, datasets: data}, options: opts});
    };

    // Button-style legend: click to toggle, styles match IC/pipeline pattern
    const _makeLegend = (containerId, chartKey, colorArr) => {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';
      const c = charts[chartKey];
      if (!c) return;
      c.data.datasets.forEach((ds, i) => {
        const col = colorArr[i] || colorArr[i % colorArr.length] || '#94a3b8';
        const btn = document.createElement('button');
        btn.dataset.hidden = '0';
        btn.style.cssText = `font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid ${col};background:${col}22;color:${col};transition:all 0.15s;white-space:nowrap`;
        btn.textContent = ds.label;
        btn.onclick = () => {
          const isHidden = btn.dataset.hidden === '1';
          c.getDatasetMeta(i).hidden = !isHidden;
          btn.dataset.hidden = isHidden ? '0' : '1';
          btn.style.background = isHidden ? col+'22' : 'transparent';
          btn.style.borderColor = isHidden ? col : col+'44';
          btn.style.color = isHidden ? col : col+'44';
          c.update('none');
        };
        container.appendChild(btn);
      });
    };

    const CHART_OPT = (stacked, yFmt, maxTicks=12) => ({ ...CHART_DEFAULTS,
      plugins: { ...CHART_DEFAULTS.plugins,
        legend: { display: false },
        tooltip: { ...CHART_DEFAULTS.plugins.tooltip, callbacks: { label: c => c.raw===null?null:(` ${c.dataset.label}: `+yFmt(c.raw)) } }
      },
      scales: {
        x: { ticks:{color:"#64748b",font:{family:"Space Mono",size:9},maxRotation:45,autoSkip:true,maxTicksLimit:maxTicks}, grid:{color:"#1e2d4544"} },
        y: { stacked, ticks:{color:"#94a3b8",font:{family:"Space Mono",size:9},callback:yFmt}, grid:{color:"#1e2d45"} }
      }
    });

    // ── Shared NOW line plugin factory ──
    const _makeNowLinePlugin = (nowIdx, id='nowLine') => ({
      id,
      afterDraw(chart) {
        if (nowIdx < 0) return;
        const {ctx, chartArea:{top,bottom}, scales:{x}} = chart;
        const xPos = x.getPixelForValue(nowIdx);
        ctx.save();
        ctx.beginPath(); ctx.moveTo(xPos,top); ctx.lineTo(xPos,bottom);
        ctx.strokeStyle='#ffffff66'; ctx.lineWidth=1; ctx.setLineDash([4,3]); ctx.stroke();
        ctx.fillStyle='#94a3b8'; ctx.font='9px Space Mono'; ctx.setLineDash([]);
        ctx.fillText('NOW', xPos+3, top+12);
        ctx.restore();
      }
    });

    // Helper: blend a hex color with white at given ratio (0=original, 1=white)
    const _blendWhite = (hex, ratio) => {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      const nr = Math.round(r + (255-r)*ratio), ng = Math.round(g + (255-g)*ratio), nb = Math.round(b + (255-b)*ratio);
      return `#${nr.toString(16).padStart(2,'0')}${ng.toString(16).padStart(2,'0')}${nb.toString(16).padStart(2,'0')}`;
    };

    // ── Unified date axis from scraper (complete actuals + clean nominations) ──
    const chartDates    = gbb.chart_dates || [];
    const forecastDates = new Set(gbb.forecast_dates || []);
    const _dashStyle    = d => forecastDates.has(d) ? [4,3] : undefined;
    const _yTJ = v => v >= 1000 || v <= -1000 ? (v/1000).toFixed(1)+'k TJ' : v.toFixed(0)+' TJ';
    const todayAestMs = Date.now() + 10 * 3600 * 1000;
    const todayStr = new Date(todayAestMs).toISOString().slice(0,10);

    // ── Production chart ──
    const prodHist = gbb.production_history || {};
    const PROD_COLORS = { "QLD (CSG+LNG)":"#f39c12","SA: Moomba":"#e74c3c","VIC: Longford":"#2ed573","VIC: Otway":"#1abc9c","VIC: Orbost":"#3498db","VIC: ATHENA":"#9b59b6","VIC: Lang Lang":"#27ae60","NT":"#64748b","Storage (net)":"#ffffff" };
    const PROD_ORDER = ["QLD (CSG+LNG)","SA: Moomba","VIC: Longford","VIC: Otway","VIC: Orbost","VIC: ATHENA","VIC: Lang Lang","NT","Storage (net)"];
    if (Object.keys(prodHist).length && chartDates.length) {
      // Find today's index for the NOW line
      const nowIdx = chartDates.indexOf(todayStr);

      const prodDatasets = PROD_ORDER.filter(k=>prodHist[k]).map(k=>({
        label: k.replace("VIC: ","").replace("SA: ",""),
        data: chartDates.map(d=>{const p=(prodHist[k]||[]).find(x=>x.gas_date===d);return p?p.supply_tj:null;}),
        borderColor: chartDates.map(d=>forecastDates.has(d) ? _blendWhite(PROD_COLORS[k],0.6) : PROD_COLORS[k]),
        backgroundColor: k==="Storage (net)" ? PROD_COLORS[k]+"22" :
          chartDates.map(d=>forecastDates.has(d) ? _blendWhite(PROD_COLORS[k],0.6)+'44' : PROD_COLORS[k]+"cc"),
        borderWidth: k==="Storage (net)" ? 2 : 1.5,
        pointRadius: k==="Storage (net)" ? 2 : 0,
        tension: 0.2, fill: k==="Storage (net)" ? "origin" : true,
        segment: {borderDash: ctx=>_dashStyle(chartDates[ctx.p0DataIndex])},
      }));

      // NOW line plugin
      const nowLineGBB = _makeNowLinePlugin(nowIdx, 'nowLineGBB');

      const prodCtx = document.getElementById("gbbProductionChart");
      if (prodCtx) {
        destroyChart("gbbProduction");
        charts.gbbProduction = new Chart(prodCtx, {type:"line", data:{labels:_dateLabels(chartDates), datasets:prodDatasets},
          options:{ ...CHART_DEFAULTS, plugins:{ ...CHART_DEFAULTS.plugins,
            legend:{display:false},
            tooltip:{...CHART_DEFAULTS.plugins.tooltip,callbacks:{label:c=>c.raw===null?null:(` ${c.dataset.label}: `+(c.raw>=0?"+":"")+_yTJ(c.raw))}}},
            scales:{
              x:{ticks:{color:"#64748b",font:{family:"Space Mono",size:9},maxRotation:45,autoSkip:true,maxTicksLimit:12},grid:{color:"#1e2d4544"}},
              y:{stacked:true,ticks:{color:"#94a3b8",font:{family:"Space Mono",size:9},callback:_yTJ},grid:{color:"#1e2d45"}}
            }},
          plugins: [nowLineGBB]
        });
        _makeLegend("gbbProdLegend","gbbProduction", PROD_ORDER.filter(k=>prodHist[k]).map(k=>PROD_COLORS[k]));
      }
    }

    // ── Demand by sector chart ──
    const demSector = gbb.demand_by_sector || {};
    const SECTOR_COLORS = { "LNG Export":"#e74c3c","Residential & Commercial":"#3498db","Large Industrial":"#9b59b6","Gas Power Generation":"#f39c12" };
    const SECTOR_ORDER = ["LNG Export","Residential & Commercial","Large Industrial","Gas Power Generation"];
    if (Object.keys(demSector).length && chartDates.length) {
      _makeChart("gbbDemandSectorChart","gbbDemandSector",
        SECTOR_ORDER.filter(k=>demSector[k]).map(k=>({ label:k,
          data:chartDates.map(d=>{const p=(demSector[k]||[]).find(x=>x.gas_date===d);return p?p.demand_tj:null;}),
          borderColor:SECTOR_COLORS[k],backgroundColor:SECTOR_COLORS[k]+"cc",borderWidth:1.5,pointRadius:0,tension:0.2,fill:true,
          segment:{borderDash:ctx=>_dashStyle(chartDates[ctx.p0DataIndex])} })),
        _dateLabels(chartDates), CHART_OPT(true, _yTJ));
      _makeLegend("gbbDemLegend","gbbDemandSector", SECTOR_ORDER.filter(k=>demSector[k]).map(k=>SECTOR_COLORS[k]));
    }

    // ── Pipeline flows chart — bold selected, dim others ──
    const pipeFlows = gbb.pipeline_flows || {};
    console.log('[GBB charts] chartDates:', chartDates.length, 'pipeFlows:', Object.keys(pipeFlows).length, 'storage:', Object.keys(storage).length);
    const PIPE_COLORS = ["#2ed573","#f39c12","#3498db","#e74c3c","#9b59b6","#1abc9c","#e67e22","#64748b"];
    if (Object.keys(pipeFlows).length) {
      const pipeAllDates = [...new Set(Object.values(pipeFlows).flatMap(pts => pts.map(p => p.gas_date)))].sort();
      const pipeEntries = Object.entries(pipeFlows);
      const pipeDatasets = pipeEntries.map(([lbl,pts],i)=>({
        label: lbl.replace(/\(|\)/g,"").trim(),
        data: pipeAllDates.map(d=>{const p=pts.find(x=>x.gas_date===d);return p?p.flow_tj:null;}),
        borderColor: PIPE_COLORS[i%PIPE_COLORS.length],
        backgroundColor: "transparent",
        borderWidth: 1.5, pointRadius: 0, tension: 0.2, spanGaps: true,
        segment:{borderDash:ctx=>_dashStyle(pipeAllDates[ctx.p0DataIndex])},
      }));
      const nowPipeIdx = pipeAllDates.indexOf(todayStr);
      const pipeCtx = document.getElementById("gbbPipelineChart");
      if (pipeCtx) {
        destroyChart("gbbPipeline");
        let _selectedPipe = null;
        const _applyPipeStyle = (selLabel) => {
          const c = charts.gbbPipeline;
          if (!c) return;
          _selectedPipe = selLabel;
          c.data.datasets.forEach((ds, i) => {
            const isSel = _selectedPipe === null || ds.label === _selectedPipe;
            ds.borderWidth = isSel ? 3 : 1;
            ds.borderColor = isSel ? PIPE_COLORS[i%PIPE_COLORS.length]
              : PIPE_COLORS[i%PIPE_COLORS.length] + "44";
          });
          // Update button styles
          const container = document.getElementById("gbbPipeLegend");
          if (container) container.querySelectorAll('button').forEach((btn, i) => {
            const col = PIPE_COLORS[i%PIPE_COLORS.length];
            const isSel = _selectedPipe === null || btn.textContent === _selectedPipe;
            btn.style.background = isSel ? col+'22' : 'transparent';
            btn.style.borderColor = isSel ? col : col+'44';
            btn.style.color = isSel ? col : col+'44';
            btn.style.fontWeight = (isSel && _selectedPipe !== null) ? '700' : '400';
          });
          c.update("none");
        };
        charts.gbbPipeline = new Chart(pipeCtx, {type:"line",
          data:{labels:_dateLabels(pipeAllDates), datasets:pipeDatasets},
          options:{ ...CHART_DEFAULTS,
            plugins:{ ...CHART_DEFAULTS.plugins,
              legend:{display:false},
              tooltip:{...CHART_DEFAULTS.plugins.tooltip,callbacks:{label:c=>c.raw===null?null:(` ${c.dataset.label}: `+_yTJ(c.raw))}}
            },
            scales:{
              x:{ticks:{color:"#64748b",font:{family:"Space Mono",size:9},maxRotation:45,autoSkip:true,maxTicksLimit:12},grid:{color:"#1e2d4544"}},
              y:{ticks:{color:"#94a3b8",font:{family:"Space Mono",size:9},callback:_yTJ},grid:{color:"#1e2d45"},beginAtZero:true}
            }
          },
          plugins: [_makeNowLinePlugin(nowPipeIdx, 'nowLinePipe')]
        });
        // Build pipeline buttons with bold-on-click behaviour
        const pipeLegend = document.getElementById("gbbPipeLegend");
        if (pipeLegend) {
          pipeLegend.innerHTML = '';
          pipeDatasets.forEach((ds, i) => {
            const col = PIPE_COLORS[i%PIPE_COLORS.length];
            const btn = document.createElement('button');
            btn.style.cssText = `font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid ${col};background:${col}22;color:${col};transition:all 0.15s;white-space:nowrap`;
            btn.textContent = ds.label;
            btn.onclick = () => {
              const newSel = (_selectedPipe === ds.label) ? null : ds.label;
              _applyPipeStyle(newSel);
            };
            pipeLegend.appendChild(btn);
          });
        }
      }
    }

    // ── Storage levels chart — uses its own date range (independent of chartDates) ──
    if (Object.keys(storage).length) {
      const storAllDates = [...new Set(Object.values(storage).flatMap(pts => pts.map(p => p.gas_date)))].sort();
      const storLabels = _dateLabels(storAllDates);
      const storColors = Object.keys(storage).map(name => STOR_COLORS[name]||"#64748b");
      _makeChart("gbbStorageChart","gbbStorage",
        Object.entries(storage).map(([name,pts])=>({ label:name,
          data:storAllDates.map(d=>{const p=pts.find(x=>x.gas_date===d);return p?p.held_tj:null;}),
          borderColor:STOR_COLORS[name]||"#64748b",backgroundColor:"transparent",borderWidth:1.5,pointRadius:0,tension:0.2,spanGaps:true })),
        storLabels,
        { ...CHART_DEFAULTS, plugins:{ ...CHART_DEFAULTS.plugins,
            legend:{display:false},

async function fetchGasData() {
  const content = document.getElementById('gas-content');
  if (content && !_gasData) {
    content.innerHTML = '<div style="font-family:var(--font-mono);font-size:10px;color:#475569;padding:16px 0">Loading gas data… (first load ~15s)</div>';
  }
  try {
    const resp = await fetch('/api/gas');
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      if (content) content.innerHTML = `<div style="font-family:var(--font-mono);font-size:10px;color:#e74c3c;padding:16px 0">Error: ${err.error || resp.status}</div>`;
      return;
    }
    _gasData = await resp.json();
    if (currentPanel === 'gas') {
      if (latestData) renderPanel('gas', latestData);
      setTimeout(() => _drawGasCharts(_gasData), 50);
      fetchGBBData();
    }
  } catch(e) {
    if (content) content.innerHTML = `<div style="font-family:var(--font-mono);font-size:10px;color:#e74c3c;padding:16px 0">Error: ${e.message}</div>`;
  }
}

// ── D-1 date helpers ─────────────────────────────────────────────────────────
// Store selected date as plain {y,m,d} integers to avoid all TZ issues
// _dMinusSel = {y:2026, m:3, d:19}  (1-indexed month)
// _dMinusCalView = {y, m} current calendar page (1-indexed month)

function _dSelToStr(sel) {
  // {y,m,d} → "YYYYMMDD"
  return sel.y.toString() + String(sel.m).padStart(2,'0') + String(sel.d).padStart(2,'0');
}
function _dSelToLabel(sel) {
  return new Date(sel.y, sel.m-1, sel.d)
    .toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function _dToday() {
  const n = new Date();
  return {y: n.getFullYear(), m: n.getMonth()+1, d: n.getDate()};
}
function _dCmp(a, b) { // -1 / 0 / 1
  if (a.y !== b.y) return a.y < b.y ? -1 : 1;
  if (a.m !== b.m) return a.m < b.m ? -1 : 1;
  if (a.d !== b.d) return a.d < b.d ? -1 : 1;
  return 0;
}

function dMinusBuildCalendar() {
  const today = _dToday();
  const sel   = window._dMinusSel || {y: today.y, m: today.m, d: today.d - 1};
  const view  = window._dMinusCalView || {y: sel.y, m: sel.m};
  const {y, m} = view;

  const firstDow = new Date(y, m-1, 1).getDay(); // 0=Sun
  const lastDay  = new Date(y, m, 0).getDate();   // days in month
  const monthName = new Date(y, m-1, 1).toLocaleDateString('en-AU', {month:'long', year:'numeric'});

  const todayYM = today.y * 12 + today.m;
  const viewYM  = y * 12 + m;

  let cal = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
  cal += `<button onclick="dMinusNavMonth(-1)" style="background:none;border:none;color:#94a3b8;font-size:16px;cursor:pointer;padding:2px 6px">‹</button>`;
  cal += `<span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:#e2e8f0">${monthName}</span>`;
  if (viewYM < todayYM) {
    cal += `<button onclick="dMinusNavMonth(1)" style="background:none;border:none;color:#94a3b8;font-size:16px;cursor:pointer;padding:2px 6px">›</button>`;
  } else {
    cal += `<span style="width:28px"></span>`;
  }
  cal += `</div>`;

  cal += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">`;
  for (const lbl of ['Su','Mo','Tu','We','Th','Fr','Sa'])
    cal += `<div style="font-family:var(--font-mono);font-size:9px;color:#475569;text-align:center">${lbl}</div>`;
  cal += `</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;

  for (let i = 0; i < firstDow; i++) cal += `<div></div>`;

  for (let d = 1; d <= lastDay; d++) {
    const cell    = {y, m, d};
    const isSel   = _dCmp(cell, sel) === 0;
    const isFuture = _dCmp(cell, today) > 0;
    const isToday = _dCmp(cell, today) === 0;
    // Grey out dates older than 13 days (TradingIS CURRENT window) or today/future
    const cellDate = new Date(y, m-1, d);
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 13);
    const isTooOld = cellDate < cutoff;
    const isDisabled = isFuture || isTooOld;
    const bg      = isSel ? '#3b82f6' : isToday ? '#475569' : 'transparent';
    const fg      = isSel ? '#fff' : isDisabled ? '#1e2d45' : '#e2e8f0';
    const dateArg = `${y},${m},${d}`;
    cal += `<div onclick="${isDisabled ? '' : `dMinusSelectDate(${dateArg})`}"
      style="font-family:var(--font-mono);font-size:10px;text-align:center;padding:4px 2px;
      border-radius:4px;background:${bg};color:${fg};
      cursor:${isDisabled ? 'default' : 'pointer'}${isTooOld ? ';text-decoration:line-through' : ''}">${d}</div>`;
  }
  cal += `</div>`;
  cal += `<div style="display:flex;justify-content:flex-end;margin-top:8px">
    <button onclick="dMinusShowCalendar()" style="font-family:var(--font-mono);font-size:10px;
    padding:4px 10px;border-radius:6px;border:1px solid #334155;background:transparent;
    color:#64748b;cursor:pointer">close</button>
  </div>`;
  return cal;
}

function dMinusShowCalendar() {
  const cal = document.getElementById('dMinus-calendar');
  if (!cal) return;
  if (cal.style.display === 'none') {
    // Reset view to selected month when opening
    const sel = window._dMinusSel;
    if (sel) window._dMinusCalView = {y: sel.y, m: sel.m};
    cal.innerHTML = dMinusBuildCalendar();
    cal.style.display = 'block';
  } else {
    cal.style.display = 'none';
  }
}

function dMinusNavMonth(dir) {
  const view = window._dMinusCalView || window._dMinusSel || _dToday();
  let nm = view.m + dir;
  let ny = view.y;
  if (nm > 12) { nm = 1; ny++; }
  if (nm < 1)  { nm = 12; ny--; }
  const today = _dToday();
  if (ny * 12 + nm > today.y * 12 + today.m) return;
  window._dMinusCalView = {y: ny, m: nm};
  const calEl = document.getElementById('dMinus-calendar');
  if (calEl) calEl.innerHTML = dMinusBuildCalendar();
}

function dMinusSelectDate(y, m, d) {
  window._dMinusSel = {y, m, d};
  const cal = document.getElementById('dMinus-calendar');
  if (cal) cal.style.display = 'none';
  const lbl = _dSelToLabel({y, m, d});
  const btn = document.getElementById('dMinus-date-btn');
  if (btn) btn.innerHTML = '📅 ' + lbl;
  const title = document.getElementById('dMinus-chart-title');
  if (title) title.textContent = '5-min Dispatch Price ($/MWh) — ' + lbl;
  window._dMinus1PriceData = null;
  window._dMinus1Dispatch5m = null;
  dMinusLoadPrices(_dSelToStr({y, m, d}));
}

async function dMinusLoadPrices(dateStr) {
  const status = document.getElementById('dMinus-status');

  // Browser cache — D-1 data is immutable, skip fetch if already loaded for this date
  if (window._dm1Cache?.date === dateStr && window._dm1Cache?.fast) {
    window._dMinus1Data = window._dm1Cache.fast;
    drawDMinus1PriceChart(window._dMinus1Data);
    drawDMinus1DemandChart(window._dMinus1Data);
    drawDMinus1RenewChart(window._dMinus1Data);
    drawDm1IcChart(window._dMinus1Data);
    drawDm1BatteryCharts(window._dMinus1Data);
    _loadDm1Portfolio();
    if (window._dm1Cache.fuel) {
      window._dMinus1Data = { ...window._dm1Cache.fast, fuel_history: window._dm1Cache.fuel.fuel_history };
      drawDMinus1RenewChart(window._dMinus1Data);
      drawDm1FuelMixChart(window._dMinus1Data);
    }
    if (status) status.textContent = '';
    return;
  }

  if (status) status.textContent = 'Loading…';
  destroyChart('dm1Price');
  destroyChart('dm1Demand');
  destroyChart('dm1Renew');
  destroyChart('dm1Fuel');
  destroyChart('dm1FuelMix');
  destroyChart('dm1Ic');
  destroyChart('dm1BattMw');
  destroyChart('dm1BattSoc');

  // Initialise cache entry for this date
  if (!window._dm1Cache || window._dm1Cache.date !== dateStr) {
    window._dm1Cache = { date: dateStr, fast: null, fuel: null };
  }

  try {
    const fast = await fetch(`/api/historical_day_fast?date=${dateStr}`).then(r => r.json());
    if (!fast || fast.error) {
      if (status) status.textContent = `No data for ${dateStr}`;
      return;
    }
    window._dm1Cache.fast = fast;
    window._dMinus1Data = fast;
    if (status) status.textContent = 'Loading fuel mix…';
    drawDMinus1PriceChart(fast);
    drawDMinus1DemandChart(fast);
    drawDMinus1RenewChart(fast);
    drawDm1IcChart(fast);
    drawDm1BatteryCharts(fast);
    _loadDm1Portfolio();

    const fuel = await fetch(`/api/historical_day_fuel?date=${dateStr}`).then(r => r.json());
    if (fuel && !fuel.error && fuel.fuel_history) {
      window._dm1Cache.fuel = fuel;
      window._dMinus1Data = { ...fast, fuel_history: fuel.fuel_history };
      drawDMinus1RenewChart(window._dMinus1Data);
      drawDm1FuelMixChart(window._dMinus1Data);
    }
    if (status) status.textContent = '';
  } catch(e) {
    if (status) status.textContent = `Error: ${e.message}`;
  }
}
